<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Callback — Interview Tracker</title>

<!-- PWA / "Add to Home Screen" -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Callback" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b0f1a" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 40 L28 28 L36 36 L48 22' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='48' cy='22' r='4' fill='white'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 40 L28 28 L36 36 L48 22' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='48' cy='22' r='4' fill='white'/%3E%3C/svg%3E" />

<style>
:root{
  --bg:#0b0f1a; --bg2:#0f1525; --panel:#151b2e; --panel2:#1b2236;
  --line:#26304a; --line2:#323d5c;
  --txt:#e7ecf6; --muted:#9aa6c2; --faint:#6b7795;
  --accent:#6366f1; --accent2:#22d3ee; --accent3:#a78bfa;
  --good:#34d399; --warn:#fbbf24; --bad:#f87171; --hot:#fb7185;
  --radius:18px; --radius-sm:12px;
  --shadow:0 10px 40px -12px rgba(0,0,0,.55);
  --grad:linear-gradient(135deg,var(--accent),var(--accent3));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 700px at 85% -10%, rgba(99,102,241,.16), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, rgba(34,211,238,.12), transparent 55%),
    var(--bg);
  color:var(--txt);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
::selection{background:rgba(99,102,241,.4)}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--accent2);text-decoration:none}
input,select,textarea{
  width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
  border-radius:var(--radius-sm);padding:11px 12px;outline:none;transition:border .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px 2px;font-weight:600;letter-spacing:.02em}
.scroll::-webkit-scrollbar{width:10px;height:10px}
.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:10px;border:2px solid var(--bg)}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:230px;flex:0 0 230px;padding:20px 14px;border-right:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),rgba(15,21,37,.4));
  display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .logo{width:36px;height:36px;border-radius:11px;background:var(--grad);display:grid;place-items:center;box-shadow:0 6px 18px -6px var(--accent)}
.brand .logo svg{width:22px;height:22px}
.brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.02em}
.brand small{display:block;color:var(--faint);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:var(--muted);font-weight:600;transition:.15s;width:100%;text-align:left}
.nav-btn svg{width:19px;height:19px;flex:0 0 19px;opacity:.85}
.nav-btn:hover{background:var(--panel);color:var(--txt)}
.nav-btn.active{background:linear-gradient(135deg,rgba(99,102,241,.22),rgba(167,139,250,.12));color:#fff;box-shadow:inset 0 0 0 1px var(--line2)}
.nav-btn .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:1px 8px;min-width:20px;text-align:center}
.nav-btn .badge.alert{background:var(--hot)}
.side-spacer{flex:1}
.side-foot{display:flex;flex-direction:column;gap:6px;padding-top:10px;border-top:1px solid var(--line)}
.mini-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:var(--faint);font-size:13px;font-weight:600;transition:.15s}
.mini-btn:hover{background:var(--panel);color:var(--muted)}
.mini-btn svg{width:16px;height:16px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:16px 26px;
  background:linear-gradient(180deg,rgba(11,15,26,.92),rgba(11,15,26,.72));backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.view-title{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0}
.view-sub{color:var(--faint);font-size:12.5px;margin-top:1px}
.search{position:relative;flex:1;max-width:420px;margin-left:8px}
.search input{padding-left:38px;background:var(--panel)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;font-weight:700;font-size:14px;transition:.15s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 8px 22px -8px var(--accent)}
.btn.primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:var(--panel);color:var(--txt);box-shadow:inset 0 0 0 1px var(--line)}
.btn.ghost:hover{background:var(--panel2)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn.danger{color:var(--bad)}
.btn.danger:hover{background:rgba(248,113,113,.12)}

.content{padding:24px 26px 90px;flex:1}
.content.pad0{padding:0 0 90px}

/* ---------- Cards / generic ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
.grid-2{grid-template-columns:1fr 1fr}
@media(max-width:860px){ .grid-2{grid-template-columns:1fr} }
.stat{padding:18px;border-radius:var(--radius);background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);position:relative;overflow:hidden}
.stat .ico{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(99,102,241,.14);color:var(--accent3)}
.stat .ico svg{width:18px;height:18px}
.stat .num{font-size:30px;font-weight:850;letter-spacing:-.03em;line-height:1.1}
.stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:3px}
.stat .sub{color:var(--faint);font-size:11.5px;margin-top:7px}
.stat.hot .ico{background:rgba(251,113,133,.16);color:var(--hot)}
.stat.hot .num{color:var(--hot)}
.stat[data-tile]{cursor:pointer}
.stat[data-tile]:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat[data-tile]:active{transform:translateY(0)}
.stat .tile-go{position:absolute;right:14px;bottom:12px;color:var(--faint);font-size:15px;font-weight:800;opacity:0;transition:.15s}
.stat[data-tile]:hover .tile-go{opacity:1;color:var(--accent3)}

.section-head{display:flex;align-items:center;gap:10px;margin:26px 2px 14px}
.section-head h3{font-size:15px;font-weight:800;margin:0;letter-spacing:.01em}
.section-head .line{flex:1;height:1px;background:var(--line)}
.section-head .tag{font-size:11px;color:var(--faint);font-weight:700}

.panel{padding:18px}
.panel-title{font-weight:800;font-size:14px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.panel-title svg{width:16px;height:16px;color:var(--accent3)}

/* chips */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.tag-chip{background:rgba(99,102,241,.12);color:var(--accent3);border-color:rgba(99,102,241,.25)}

.empty{display:grid;place-items:center;text-align:center;padding:60px 20px;color:var(--faint)}
.empty .big{width:64px;height:64px;border-radius:18px;background:var(--panel);display:grid;place-items:center;margin-bottom:16px;box-shadow:var(--shadow)}
.empty .big svg{width:30px;height:30px;color:var(--accent3)}
.empty h3{color:var(--txt);margin:0 0 6px;font-size:18px}

/* ---------- Kanban ---------- */
.board{display:flex;gap:14px;padding:18px 26px;overflow-x:auto;align-items:flex-start}
.col{flex:0 0 270px;width:270px;background:linear-gradient(180deg,var(--bg2),rgba(15,21,37,.3));border:1px solid var(--line);border-radius:var(--radius);max-height:calc(100vh - 180px);display:flex;flex-direction:column}
.col.drop{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
.col-head{padding:13px 14px 10px;display:flex;align-items:center;gap:9px;position:sticky;top:0}
.col-head .dot{width:9px;height:9px;border-radius:50%}
.col-head .nm{font-weight:800;font-size:13px}
.col-head .ct{margin-left:auto;color:var(--faint);font-size:12px;font-weight:700;background:var(--panel);padding:1px 8px;border-radius:999px}
.col-body{padding:4px 10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
.kcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;position:relative}
.kcard:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.kcard.dragging{opacity:.5}
.kcard .co{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.fav{position:relative}
.kcard .fav{width:26px;height:26px;border-radius:8px;flex:0 0 26px;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;overflow:hidden}
.kcard .fav img{width:100%;height:100%;object-fit:cover}
.kcard .cn{font-weight:800;font-size:13.5px;line-height:1.2}
.kcard .rl{color:var(--muted);font-size:12px;margin-top:1px}
.kcard .meta{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
.kcard .stars{color:var(--warn);font-size:11px;letter-spacing:1px}
.kcard .next{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent2);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.kcard .next svg{width:13px;height:13px}
.kcard .next.soon{color:var(--warn)}
.kcard .next.over{color:var(--bad)}
.kcard .flag{position:absolute;top:10px;right:10px;font-size:13px}

/* ---------- Table ---------- */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:760px}
thead th{text-align:left;padding:13px 14px;color:var(--faint);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:var(--bg2);border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--muted)}
tbody tr{border-bottom:1px solid var(--line);transition:.12s;cursor:pointer}
tbody tr:hover{background:var(--panel2)}
tbody td{padding:12px 14px;vertical-align:middle}
.cell-co{display:flex;align-items:center;gap:10px}
.cell-co .fav{width:30px;height:30px;border-radius:9px;flex:0 0 30px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;overflow:hidden}
.cell-co .fav img{width:100%;height:100%;object-fit:cover}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:800;white-space:nowrap}
.pill .dot{width:7px;height:7px;border-radius:50%}

/* ---------- Charts ---------- */
.chart-grid{grid-template-columns:1.4fr 1fr}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .nm{width:120px;flex:0 0 120px;font-size:12.5px;color:var(--muted);font-weight:600;text-align:right}
.bar-track{flex:1;height:24px;background:var(--bg2);border-radius:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;font-size:11.5px;font-weight:800;color:#fff;min-width:24px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.legend{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.legend-row{display:flex;align-items:center;gap:9px;font-size:13px}
.legend-row .dot{width:11px;height:11px;border-radius:4px;flex:0 0 11px}
.legend-row .v{margin-left:auto;font-weight:800;color:var(--muted)}

/* ---------- Modal / Drawer ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,8,15,.66);backdrop-filter:blur(6px);z-index:100;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,100vw);background:var(--bg2);border-left:1px solid var(--line);z-index:101;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.3,.9,.3,1);display:flex;flex-direction:column;box-shadow:-30px 0 60px -20px rgba(0,0,0,.6)}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:5}
.drawer-body{padding:20px;overflow-y:auto;flex:1}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--bg2)}
.x-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--panel);color:var(--muted)}
.x-btn:hover{background:var(--panel2);color:var(--txt)}
.x-btn svg{width:18px;height:18px}

.tabs{display:flex;gap:4px;padding:4px;background:var(--panel);border-radius:12px;margin-bottom:18px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
.tab.active{background:var(--panel2);color:#fff;box-shadow:inset 0 0 0 1px var(--line2)}

.form-row{margin-bottom:14px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.rating-pick{display:flex;gap:6px}
.rating-pick .s{font-size:22px;cursor:pointer;color:var(--line2);transition:.1s}
.rating-pick .s.on{color:var(--warn)}

.sub-item{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.sub-item .si-head{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.sub-item .si-head .nm{font-weight:800;font-size:13.5px}
.sub-item .si-head .del{margin-left:auto;color:var(--faint);width:26px;height:26px;border-radius:8px;display:grid;place-items:center}
.sub-item .si-head .del:hover{color:var(--bad);background:rgba(248,113,113,.1)}
.sub-item .si-meta{color:var(--muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}
.add-sub{width:100%;padding:11px;border:1.5px dashed var(--line2);border-radius:12px;color:var(--muted);font-weight:700;font-size:13px;transition:.15s}
.add-sub:hover{border-color:var(--accent);color:var(--accent3);background:rgba(99,102,241,.06)}

.ai-box{background:linear-gradient(160deg,rgba(99,102,241,.1),rgba(34,211,238,.06));border:1px solid rgba(99,102,241,.3);border-radius:14px;padding:16px;margin-bottom:14px}
.ai-box .ai-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;font-weight:800;font-size:13.5px}
.ai-box .ai-head svg{width:18px;height:18px;color:var(--accent3)}
.ai-pre{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;font:12px/1.6 ui-monospace,Menlo,Consolas,monospace;color:var(--muted);white-space:pre-wrap;max-height:260px;overflow:auto;margin-bottom:10px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line2);color:var(--txt);
  padding:12px 18px;border-radius:12px;font-weight:700;font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:.25s;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--good)}

.detail-hero{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.detail-hero .fav{width:48px;height:48px;border-radius:13px;flex:0 0 48px;display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;overflow:hidden}
.detail-hero .fav img{width:100%;height:100%;object-fit:cover}
.detail-hero h2{margin:0;font-size:19px;font-weight:850;letter-spacing:-.02em}
.detail-hero .rl{color:var(--muted);font-size:13.5px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13.5px;margin:14px 0}
.kv dt{color:var(--faint);font-weight:600}
.kv dd{margin:0;font-weight:600}
.note-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.6;color:var(--muted);white-space:pre-wrap;margin-bottom:12px}

.mobile-nav{display:none}

.pipe-bar{display:flex;align-items:center;gap:12px;padding:14px 26px 10px}

@media(max-width:860px){
  html,body{overflow-x:hidden;max-width:100vw}
  .sidebar{display:none}
  .chart-grid{grid-template-columns:1fr}
  /* breathing room top & bottom incl. iOS safe areas */
  .topbar{padding:calc(10px + env(safe-area-inset-top)) 16px 12px;gap:10px;flex-wrap:wrap}
  .content{padding:16px 16px calc(96px + env(safe-area-inset-bottom))}
  .content.pad0{padding:0 0 calc(96px + env(safe-area-inset-bottom))}
  .view-title{font-size:18px}
  .view-sub{font-size:11.5px}
  .search{order:5;max-width:none;flex:1 1 100%;margin:2px 0 0}
  .btn.primary{padding:10px 14px}
  #settingsBtn{flex:0 0 auto}
  .form-2,.form-3{grid-template-columns:1fr}
  /* Pipeline stacks vertically — no sideways scrolling */
  .pipe-bar{padding:14px 16px 8px}
  .board{flex-direction:column;overflow-x:hidden;padding:12px 14px;gap:16px}
  .col{flex:1 1 auto;width:100%;max-width:100%;max-height:none}
  .col-body{max-height:none;overflow:visible}
  /* Table view becomes cards (see renderRoleCards) so nothing scrolls sideways */
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(15,21,37,.97);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:7px 4px calc(7px + env(safe-area-inset-bottom));justify-content:space-around}
  .mnav{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 10px;border-radius:10px;color:var(--faint);font-size:10px;font-weight:700;flex:1}
  .mnav svg{width:21px;height:21px}
  .mnav.active{color:var(--accent3)}
  .drawer{width:100vw}
  .drawer-head{padding:calc(14px + env(safe-area-inset-top)) 16px 14px}
  .drawer-foot{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .kv{grid-template-columns:1fr}
  .kv dt{margin-top:6px}
  .section-head{margin:22px 2px 12px}
}
@media(max-width:380px){ .stat-grid{grid-template-columns:1fr 1fr} }

/* Role cards (mobile table replacement) */
.role-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;transition:.15s}
.role-card:active{transform:scale(.99)}
.role-card .body{flex:1;min-width:0}
.role-card .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-card .cn{font-weight:800;font-size:14.5px}
.role-card .rl{color:var(--muted);font-size:12.5px;margin-top:1px}
.role-card .ln{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;font-size:11.5px;color:var(--faint)}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">

<script>
"use strict";
/* ============================ MODEL ============================ */
const LS_KEY = "pipeline_interview_tracker_v1";

const DEFAULT_STAGES = [
  {id:"wishlist",  name:"Wishlist",        color:"#94a3b8", active:true},
  {id:"applied",   name:"Applied",         color:"#38bdf8", active:true},
  {id:"recruiter", name:"Recruiter Screen",color:"#22d3ee", active:true},
  {id:"hm",        name:"Hiring Manager",  color:"#818cf8", active:true},
  {id:"technical", name:"Technical / Task",color:"#a78bfa", active:true},
  {id:"onsite",    name:"Onsite / Final",  color:"#f472b6", active:true},
  {id:"offer",     name:"Offer",           color:"#34d399", active:true},
  {id:"rejected",  name:"Rejected",        color:"#f87171", active:false},
  {id:"withdrawn", name:"Withdrawn",       color:"#fb923c", active:false},
  {id:"ghosted",   name:"Ghosted",         color:"#64748b", active:false},
];
// Closed/system stages are fixed; the active pipeline stages are user-editable (state.stages)
const CLOSED_STAGES = DEFAULT_STAGES.filter(s=>!s.active);
function activeStages(){ return (state && state.stages && state.stages.length) ? state.stages : DEFAULT_STAGES.filter(s=>s.active); }
function allStages(){ return activeStages().concat(CLOSED_STAGES); }
function stage(id){ return allStages().find(s=>s.id===id) || activeStages()[0] || DEFAULT_STAGES[0]; }

const SOURCES = ["Referral","Recruiter reached out","LinkedIn","Company site","Job board","Cold apply","Networking event","Other"];
const WORKMODES = ["Remote","Hybrid","Onsite"];
const ROUND_TYPES = ["Recruiter screen","Phone / HM","Technical","Take-home","System design","Behavioral","Onsite loop","Panel","Final / Exec","Culture fit","Other"];

let state = load();
let view = "dashboard";
let searchQ = "";
let tableSort = {key:"updatedAt", dir:-1};
let openId = null;
let drawerTab = "overview";

/* ============================ STORAGE ============================ */
function load(){
  try{ const r = localStorage.getItem(LS_KEY); if(r){ const s=JSON.parse(r); return migrate(s); } }catch(e){}
  return { opportunities:[], meta:{created:Date.now()}, rev:0 };
}
function migrate(s){
  s.opportunities=s.opportunities||[];
  // every record needs a stable id so edit/delete can match it
  s.opportunities.forEach(o=>{
    if(!o.id) o.id=uid();
    (o.rounds||[]).forEach(r=>{ if(!r.id) r.id=uid(); });
    (o.people||[]).forEach(p=>{ if(!p.id) p.id=uid(); });
  });
  // derive a real revision from the newest record so cloud-seed comparisons work
  if(s.rev==null) s.rev = s.opportunities.reduce((m,o)=>Math.max(m,+o.updatedAt||0),0);
  return s;
}
function persist(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ toast("⚠ Couldn't save — storage full?"); } }
// save() = a real user change: bump revision, persist, and push to cloud
function save(){ state.rev = Date.now(); persist(); schedulePush(); }

/* ============================ CLOUD SYNC (Supabase) ============================ */
const SYNC_KEY = "callback_sync_cfg_v1";
let sync = loadSync();
let syncState = "off";           // off | idle | saving | pulling | error
let pushTimer = null, pulling = false;
function loadSync(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; }catch(e){ return {}; } }
function saveSync(){ localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); }
function syncOn(){ return !!(sync.url && sync.key && sync.code); }

function setSyncState(s,msg){ syncState=s; updateSyncUI(msg); }
function updateSyncUI(msg){
  const dot=$("#syncDot"); if(dot){ dot.style.display = syncOn()?"block":"none";
    dot.style.background = syncState==="error"?"var(--bad)":syncState==="saving"||syncState==="pulling"?"var(--warn)":"var(--good)"; }
  const lbl=$("#syncStatusLbl");
  if(lbl){ const map={off:"Not connected",idle:"Synced ✓",saving:"Saving…",pulling:"Checking cloud…",error:"⚠ "+(msg||"Sync error")}; lbl.textContent=map[syncState]||""; lbl.style.color = syncState==="error"?"var(--bad)":syncState==="idle"?"var(--good)":"var(--muted)"; }
}
async function rpc(fn, body){
  const base = sync.url.trim().replace(/\/+$/,"").replace(/\/rest\/v1$/,"");
  const res = await fetch(`${base}/rest/v1/rpc/${fn}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":sync.key, "Authorization":"Bearer "+sync.key },
    body: JSON.stringify(body)
  });
  if(!res.ok){ throw new Error("HTTP "+res.status+" "+(await res.text()).slice(0,120)); }
  const txt = await res.text(); return txt ? JSON.parse(txt) : null;
}
function schedulePush(){ if(!syncOn()) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushNow, 1500); }
async function pushNow(){
  if(!syncOn()) return;
  try{ setSyncState("saving");
    await rpc("set_vault",{ p_code:sync.code, p_data:state, p_updated: state.rev||0 });
    setSyncState("idle");
  }catch(e){ setSyncState("error", e.message); }
}
async function pullNow(opts){
  opts=opts||{};
  if(!syncOn()||pulling) return;
  pulling=true; setSyncState("pulling");
  try{
    const rows = await rpc("get_vault",{ p_code:sync.code });
    const row = Array.isArray(rows)?rows[0]:rows;
    if(row && row.data){
      const remote=row.data, rRev=+row.updated_at||remote.rev||0;
      if(rRev > (state.rev||0)){
        state=remote; persist();
        if(openId && !getOp()) closeDrawer(); else if(openId) renderDrawer();
        render(); if(!opts.silent) toast("Synced latest from cloud");
      } else if((state.rev||0) > rRev){
        await pushNow(); // local is newer — push it up
      }
    } else {
      // nothing in cloud yet — seed it with whatever we have locally
      await pushNow();
    }
    setSyncState("idle");
  }catch(e){ setSyncState("error", e.message); if(!opts.silent) toast("⚠ Sync: "+e.message); }
  pulling=false;
}
function initSync(){
  updateSyncUI();
  if(syncOn()){ setSyncState("idle"); pullNow({silent:true}); }
  window.addEventListener("online", ()=> syncOn() && pullNow({silent:true}));
  window.addEventListener("focus", ()=> syncOn() && pullNow({silent:true}));
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden && syncOn()) pullNow({silent:true}); });
}
function randomCode(){ const w=["amber","brisk","cobalt","delta","ember","fjord","glint","harbor","ivory","jade","koala","lunar","maple","nimbus","onyx","pixel","quartz","raven","slate","tidal","umber","vivid","willow","xenon","yonder","zephyr"]; const p=()=>w[Math.floor(Math.random()*w.length)]; const n=Math.floor(Math.random()*9000+1000); return [p(),p(),p(),n].join("-"); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============================ HELPERS ============================ */
const $ = s => document.querySelector(s);
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }

function fmtDate(d){ if(!d) return ""; const dt=new Date(d+(d.length<=10?"T00:00":"")); if(isNaN(dt)) return ""; return dt.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtDateTime(d,t){ if(!d) return ""; let s=fmtDate(d); if(t){ const [h,m]=t.split(":"); const dt=new Date(); dt.setHours(+h,+m); s+=" · "+dt.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); } return s; }
function daysUntil(d){ if(!d) return null; const dt=new Date(d+(d.length<=10?"T00:00":"")); if(isNaN(dt)) return null; return Math.round((dt - new Date().setHours(0,0,0,0))/86400000); }
function daysSince(ts){ if(!ts) return null; return Math.floor((Date.now()-ts)/86400000); }
function relDays(n){ if(n==null) return ""; if(n===0) return "Today"; if(n===1) return "Tomorrow"; if(n===-1) return "Yesterday"; if(n>1) return "in "+n+"d"; return Math.abs(n)+"d ago"; }

function colorFor(str){ const colors=["#6366f1","#22d3ee","#a78bfa","#f472b6","#34d399","#fbbf24","#fb7185","#38bdf8","#818cf8","#2dd4bf"]; let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h); return colors[Math.abs(h)%colors.length]; }
function initials(s){ return (s||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function favHTML(o,cls){ const c=colorFor(o.company||"?"); const dom=domainOf(o); const img=dom?`<img src="https://www.google.com/s2/favicons?domain=${esc(dom)}&sz=64" loading="lazy" onerror="this.remove()" alt=""/>`:""; return `<div class="fav ${cls||''}" style="background:${c}"><span style="position:absolute">${esc(initials(o.company))}</span>${img}</div>`; }
function domainOf(o){ if(o.domain) return o.domain.replace(/^https?:\/\//,'').replace(/\/.*$/,''); if(o.jobUrl){ try{ return new URL(o.jobUrl).hostname.replace(/^www\./,''); }catch(e){} } return ""; }
function stars(n){ n=+n||0; return "★".repeat(n)+"☆".repeat(5-n); }

function nextEvent(o){
  // soonest scheduled round, else nextAction
  let best=null;
  (o.rounds||[]).forEach(r=>{ if(r.date && r.status!=="done" && r.status!=="cancelled"){ const du=daysUntil(r.date); if(du!=null && du>=-1){ if(!best||du<best.du) best={du,label:r.name||r.type,date:r.date,time:r.time,link:r.link}; } } });
  if(o.nextActionDate){ const du=daysUntil(o.nextActionDate); if(du!=null && (!best||du<best.du)) best={du,label:o.nextActionLabel||"Next step",date:o.nextActionDate,link:o.nextMeetingLink}; }
  return best;
}
function needsFollowup(o){
  const st=stage(o.status); if(!st.active || o.status==="wishlist" || o.status==="offer") return false;
  const since=daysSince(o.updatedAt);
  const ne=nextEvent(o);
  if(ne && ne.du>=0) return false; // something scheduled ahead
  return since!=null && since>=7;
}

/* ============================ ICONS ============================ */
const I = {
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',

  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>',

  trophy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4ZM7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 1-3 3"/></svg>',

  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>',
  ai:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v3M12 18v3M5.6 5.6l2 2M16.4 16.4l2 2M3 12h3M18 12h3M5.6 18.4l2-2M16.4 7.6l2-2"/><circle cx="12" cy="12" r="3.2"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',

};

/* ============================ NAV ============================ */
const VIEWS = [
  {id:"dashboard", name:"Dashboard", icon:I.dash},
  {id:"pipeline",  name:"Pipeline",  icon:I.board},
  {id:"table",     name:"All Roles", icon:I.table},
  {id:"calendar",  name:"Upcoming",  icon:I.cal},
  {id:"insights",  name:"Insights",  icon:I.spark},
];
function renderNav(){
  const alerts = state.opportunities.filter(needsFollowup).length;
  const upcoming = state.opportunities.reduce((n,o)=>{ const e=nextEvent(o); return n+(e&&e.du>=0&&e.du<=7?1:0); },0);
  $("#nav").innerHTML = VIEWS.map(v=>{
    let badge="";
    if(v.id==="calendar"&&upcoming) badge=`<span class="badge">${upcoming}</span>`;
    if(v.id==="dashboard"&&alerts) badge=`<span class="badge alert">${alerts}</span>`;
    return `<button class="nav-btn ${view===v.id?'active':''}" data-view="${v.id}">${v.icon}<span>${v.name}</span>${badge}</button>`;
  }).join("");
  $("#mnav").innerHTML = VIEWS.map(v=>`<button class="mnav ${view===v.id?'active':''}" data-view="${v.id}">${v.icon}<span>${v.name.split(" ")[0]}</span></button>`).join("");
}

/* ============================ RENDER ROUTER ============================ */
const SUBTITLES = {
  dashboard:()=>`${activeCount()} active processes · ${state.opportunities.length} total`,
  pipeline:()=>"Drag cards between stages — or tap to open",
  table:()=>"Sort, search & scan everything at once",
  calendar:()=>"Everything coming up, soonest first",
  insights:()=>"How your search is actually going",
};
function render(){
  renderNav();
  $("#viewTitle").textContent = VIEWS.find(v=>v.id===view).name;
  if(activeFilter && (view==="table"||view==="pipeline"))
    $("#viewSub").innerHTML = `Filtered to <b>${esc(activeFilter.label)}</b> · <span data-act="clear-filter" style="cursor:pointer;color:var(--accent2);font-weight:700">clear ✕</span>`;
  else $("#viewSub").textContent = SUBTITLES[view] ? SUBTITLES[view]() : "";
  const c = $("#content");
  c.className = "content"+(view==="pipeline"?" pad0":"");
  if(view==="dashboard") c.innerHTML = renderDashboard();
  else if(view==="pipeline"){ c.innerHTML=""; c.appendChild(renderPipeline()); }
  else if(view==="table") c.innerHTML = renderTable();
  else if(view==="calendar") c.innerHTML = renderCalendar();
  else if(view==="insights") c.innerHTML = renderInsights();
}

function activeCount(){ return state.opportunities.filter(o=>stage(o.status).active && o.status!=="wishlist").length; }
let activeFilter=null;
function applyTile(kind){
  const F={
    active:   ()=>{ view="pipeline"; activeFilter=null; },
    interviewing:()=>{ view="table"; activeFilter={label:"Interviewing",test:o=>["recruiter","hm","technical","onsite"].includes(o.status)}; },
    offers:   ()=>{ view="table"; activeFilter={label:"Offers",test:o=>o.status==="offer"}; },
    advance:  ()=>{ view="insights"; activeFilter=null; },
    week:     ()=>{ view="calendar"; activeFilter=null; },
    nudge:    ()=>{ view="table"; activeFilter={label:"Needs follow-up",test:needsFollowup}; },
  };
  (F[kind]||F.active)(); searchQ=$("#search").value=""; render();
}
function filtered(){
  const q=searchQ.trim().toLowerCase();
  let list=state.opportunities.slice();
  if(activeFilter) list=list.filter(activeFilter.test);
  if(q){ list=list.filter(o=>{
    const hay=[o.company,o.role,o.location,o.notes,o.product,o.vibes,o.referrer,(o.tags||[]).join(" "),(o.people||[]).map(p=>p.name+" "+p.title).join(" ")].join(" ").toLowerCase();
    return hay.includes(q);
  }); }
  return list;
}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  const ops=state.opportunities;
  if(!ops.length) return emptyState();
  const active=activeCount();
  const offers=ops.filter(o=>o.status==="offer").length;
  const interviewing=ops.filter(o=>["recruiter","hm","technical","onsite"].includes(o.status)).length;
  const applied=ops.filter(o=>o.status!=="wishlist").length;
  const advanced=ops.filter(o=>["hm","technical","onsite","offer"].includes(o.status)).length;
  const respRate=applied?Math.round(advanced/applied*100):0;
  const followups=ops.filter(needsFollowup);
  const week=ops.map(o=>({o,e:nextEvent(o)})).filter(x=>x.e&&x.e.du>=0&&x.e.du<=7).sort((a,b)=>a.e.du-b.e.du);
  const avgExc=ops.filter(o=>o.excitement).length? (ops.reduce((s,o)=>s+(+o.excitement||0),0)/ops.filter(o=>o.excitement).length).toFixed(1):"—";

  const stat=(num,lbl,sub,icon,cls,tile)=>`<div class="stat ${cls||''}" ${tile?`data-tile="${tile}" role="button" tabindex="0"`:""}><div class="ico">${icon}</div><div class="num">${num}</div><div class="lbl">${lbl}</div>${sub?`<div class="sub">${sub}</div>`:""}${tile?`<div class="tile-go">→</div>`:""}</div>`;

  let html=`<div class="grid stat-grid">
    ${stat(active,"Active processes","In flight right now",I.briefcase,"","active")}
    ${stat(interviewing,"Interviewing","Past the screen",I.user,"","interviewing")}
    ${stat(offers,"Offers","🎉",I.trophy,"","offers")}
    ${stat(respRate+"%","Advance rate",advanced+" of "+applied+" moved forward",I.spark,"","advance")}
    ${stat(week.length,"This week","Interviews scheduled",I.clock,"","week")}
    ${stat(followups.length, followups.length===1?"Needs a nudge":"Need a nudge","Quiet 7+ days",I.bell, followups.length?"hot":"","nudge")}

  // This week + follow-ups
  html+=`<div class="grid grid-2" style="margin-top:18px">`;
  html+=`<div class="card panel"><div class="panel-title">${I.clock} Coming up</div>`;

  else html+=week.map(({o,e})=>{
    const cls=e.du<=0?"over":e.du<=2?"soon":"";
    return `<div class="sub-item" data-open="${o.id}" style="cursor:pointer;margin-bottom:9px">
      <div class="si-head"><div style="display:flex;align-items:center;gap:9px">${favHTML(o)}<div><div class="nm">${esc(o.company)}</div><div style="font-size:12px;color:var(--muted)">${esc(e.label)}</div></div></div>
      <span class="chip" style="margin-left:auto;color:${cls==='over'?'var(--bad)':cls==='soon'?'var(--warn)':'var(--accent2)'}">${relDays(e.du)}</span></div>
      <div class="si-meta">${fmtDateTime(e.date,e.time)} ${e.link?`· <a href="${esc(e.link)}" target="_blank" rel="noopener">join link</a>`:""}</div>
    </div>`;
  }).join("");
  html+=`</div>`;

  html+=`<div class="card panel"><div class="panel-title">${I.bell} Follow-up radar</div>`;
  if(!followups.length) html+=`<div style="color:var(--faint);font-size:13px;padding:8px 0">All clear — nothing's gone cold. 👏</div>`;
  else html+=followups.sort((a,b)=>daysSince(b.updatedAt)-daysSince(a.updatedAt)).map(o=>`
    <div class="sub-item" data-open="${o.id}" style="cursor:pointer;margin-bottom:9px">
      <div class="si-head"><div style="display:flex;align-items:center;gap:9px">${favHTML(o)}<div><div class="nm">${esc(o.company)}</div><div style="font-size:12px;color:var(--muted)">${stage(o.status).name}</div></div></div>
      <span class="chip" style="margin-left:auto;color:var(--hot)">${daysSince(o.updatedAt)}d quiet</span></div>
    </div>`).join("");
  html+=`</div></div>`;

  // Pipeline funnel
  html+=`<div class="section-head"><h3>Pipeline funnel</h3><div class="line"></div><span class="tag">${active} active</span></div>`;
  html+=`<div class="card panel">${funnelChart()}</div>`;

  // Hot list
  const hot=ops.filter(o=>+o.excitement>=4 && stage(o.status).active).sort((a,b)=>b.excitement-a.excitement).slice(0,6);
  if(hot.length){
    html+=`<div class="section-head">${I.fire}<h3 style="margin-left:-2px">Most excited about</h3><div class="line"></div></div>`;
    html+=`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">`+hot.map(o=>kcard(o)).join("")+`</div>`;
  }
  return html;
}

/* ---------------- PIPELINE (Kanban) ---------------- */
function renderPipeline(){
  const root=el(`<div style="display:flex;flex-direction:column;height:100%"></div>`);
  root.appendChild(el(`<div class="pipe-bar"><button class="btn ghost sm" data-act="edit-stages">${I.edit} Edit stages</button><span style="font-size:12px;color:var(--faint)">Drag cards to move · tap to open</span></div>`));
  const wrap=el(`<div class="board scroll"></div>`);
  const list=filtered();
  activeStages().forEach(s=>{
    const items=list.filter(o=>o.status===s.id);
    const col=el(`<div class="col" data-stage="${s.id}">
      <div class="col-head"><span class="dot" style="background:${s.color}"></span><span class="nm">${esc(s.name)}</span><span class="ct">${items.length}</span></div>
      <div class="col-body scroll"></div></div>`);
    const body=col.querySelector(".col-body");
    items.sort((a,b)=>{ const ea=nextEvent(a),eb=nextEvent(b); if(ea&&eb) return ea.du-eb.du; if(ea)return -1; if(eb)return 1; return (b.excitement||0)-(a.excitement||0); });
    items.forEach(o=> body.appendChild(kcardEl(o)));
    wrap.appendChild(col);
  });
  // closed column (collapsed list)
  const closed=list.filter(o=>!stage(o.status).active);
  if(closed.length){
    const col=el(`<div class="col" style="opacity:.85"><div class="col-head"><span class="dot" style="background:#64748b"></span><span class="nm">Closed</span><span class="ct">${closed.length}</span></div><div class="col-body scroll"></div></div>`);
    const body=col.querySelector(".col-body");
    closed.forEach(o=> body.appendChild(kcardEl(o)));
    wrap.appendChild(col);
  }
  root.appendChild(wrap);
  return root;
}
function kcard(o){ return kcardEl(o).outerHTML; }
function kcardEl(o){
  const e=nextEvent(o);
  const cls=e?(e.du<=0?"over":e.du<=2?"soon":""):"";
  const fu=needsFollowup(o);

/* ---------------- TABLE ---------------- */
function renderTable(){
  let list=filtered();
  const {key,dir}=tableSort;
  list.sort((a,b)=>{
    let va,vb;
    if(key==="stage"){ va=allStages().findIndex(s=>s.id===a.status); vb=allStages().findIndex(s=>s.id===b.status); }
    else if(key==="next"){ va=(nextEvent(a)||{du:9999}).du; vb=(nextEvent(b)||{du:9999}).du; }
    else if(key==="excitement"){ va=+a.excitement||0; vb=+b.excitement||0; }
    else { va=(a[key]||"").toString().toLowerCase(); vb=(b[key]||"").toString().toLowerCase(); }
    if(va<vb) return -dir; if(va>vb) return dir; return 0;
  });
  if(!list.length) return `<div class="empty"><div class="big">${I.table}</div><h3>${searchQ?"No matches":"No roles yet"}</h3><p>${searchQ?"Try a different search.":"Add a role to get started."}</p></div>`;
  if(isMobile()) return renderRoleCards(list);
  const arrow=k=> key===k?`<span style="color:var(--accent3)">${dir>0?"↑":"↓"}</span>`:"";
  const th=(k,l)=>`<th data-sort="${k}">${l} ${arrow(k)}</th>`;
  let rows=list.map(o=>{
    const e=nextEvent(o); const st=stage(o.status);
    return `<tr data-open="${o.id}">
      <td><div class="cell-co">${favHTML(o)}<div><div style="font-weight:800">${esc(o.company)}</div><div style="color:var(--muted);font-size:12px">${esc(o.role||"")}</div></div></div></td>

      <td style="color:var(--muted)">${o.compMin||o.compMax?esc((o.compMin||"")+(o.compMax?"–"+o.compMax:""))+(o.compNotes?"":""):"—"}</td>
      <td style="color:var(--faint);font-size:12px">${daysSince(o.updatedAt)??0}d ago ${needsFollowup(o)?"🔔":""}</td>

  });

        <div style="display:flex;align-items:center;gap:8px"><span class="chip" style="color:${col};border-color:${col}44">${e.type}</span><span style="font-weight:800;font-size:13.5px">${esc(e.label)}</span></div>
        <div style="color:var(--muted);font-size:12.5px;margin-top:3px">${esc(e.o.company)} ${e.time?"· "+fmtDateTime(e.date,e.time).split("· ")[1]:""} ${e.link?`· <a href="${esc(e.link)}" target="_blank" rel="noopener">join</a>`:""} ${e.rid&&d>=0?`· <span data-ics="${e.rid}" style="color:var(--accent2);cursor:pointer;font-weight:700">+ calendar</span>`:""}</div>

function fmtMoney(n){ n=+n; if(!n) return ""; return n>=1000? "$"+Math.round(n/1000)+"k" : "$"+n; }

/* ---------------- CHARTS ---------------- */
function funnelChart(){
  const max=Math.max(1,...activeStages().map(s=>state.opportunities.filter(o=>o.status===s.id).length));
  return activeStages().map(s=>{
    const n=state.opportunities.filter(o=>o.status===s.id).length;
    return `<div class="bar-row" style="cursor:default"><div class="nm">${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${n?Math.max(n/max*100,8):0}%;background:${s.color}">${n||""}</div></div></div>`;
  }).join("");
}
function donut(data){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let a=-90, cx=70,cy=70,r=54,sw=24;
  const segs=data.map((d,i)=>{
    const frac=d.value/total; const len=frac*360; const col=colorFor(d.label+i);
    const large=len>180?1:0;
    const a2=a+len;
    const x1=cx+r*Math.cos(a*Math.PI/180), y1=cy+r*Math.sin(a*Math.PI/180);
    const x2=cx+r*Math.cos(a2*Math.PI/180), y2=cy+r*Math.sin(a2*Math.PI/180);
    a=a2;
    return `<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${sw}"/>`;
  }).join("");
  const legend=data.sort((a,b)=>b.value-a.value).map((d,i)=>`<div class="legend-row"><span class="dot" style="background:${colorFor(d.label+data.indexOf(d))}"></span><span>${esc(d.label)}</span><span class="v">${d.value}</span></div>`).join("");
  return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg viewBox="0 0 140 140" width="140" height="140" style="flex:0 0 140px">${segs}<text x="70" y="66" text-anchor="middle" fill="#e7ecf6" font-size="26" font-weight="800">${total}</text><text x="70" y="84" text-anchor="middle" fill="#6b7795" font-size="11" font-weight="700">total</text></svg><div class="legend" style="flex:1;min-width:140px">${legend}</div></div>`;
}

function tabBrief(o){
  const brief=buildBrief(o);
  let h=`<div class="ai-box"><div class="ai-head">${I.ai} Interview brief — paste into any AI</div>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Everything an AI needs to help you prep, write your intro, and draft smart questions. One tap to copy.</div>
    <div class="ai-pre" id="briefText">${esc(brief)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn primary sm" data-copy="brief">${I.copy} Copy brief</button>
      <button class="btn ghost sm" data-copy="prep">${I.copy} Copy "prep me" prompt</button>
      <button class="btn ghost sm" data-copy="intro">${I.copy} Copy "write my intro" prompt</button>
    </div></div>`;
  return h;
}
function buildBrief(o){
  const L=[];
  L.push(`# Interview brief — ${o.company}${o.role?` (${o.role})`:""}`);
  L.push("");
  L.push(`- Stage: ${stage(o.status).name}`);
  if(o.source) L.push(`- How I got here: ${o.source}${o.referrer?` (via ${o.referrer})`:""}`);
  if(o.workMode||o.location) L.push(`- Setup: ${[o.workMode,o.location].filter(Boolean).join(", ")}`);
  if(o.compMin||o.compMax) L.push(`- Comp target: ${(o.compMin?fmtMoney(o.compMin):"")}${o.compMax?"–"+fmtMoney(o.compMax):""}${o.compNotes?` (${o.compNotes})`:""}`);
  if(o.excitement) L.push(`- My excitement: ${o.excitement}/5`);
  const e=nextEvent(o); if(e) L.push(`- Next: ${e.label} on ${fmtDateTime(e.date,e.time)||fmtDate(e.date)}`);
  if(o.jobUrl) L.push(`- Job post: ${o.jobUrl}`);
  if((o.tags||[]).length) L.push(`- Tags: ${o.tags.join(", ")}`);
  if(o.product){ L.push(""); L.push(`## Company / product`); L.push(o.product); }
  if(o.vibes){ L.push(""); L.push(`## Vibes / culture read`); L.push(o.vibes); }
  if(o.notes){ L.push(""); L.push(`## My notes`); L.push(o.notes); }
  if((o.people||[]).length){ L.push(""); L.push(`## People I'm meeting`); o.people.forEach(p=>{ L.push(`- ${p.name}${p.title?` — ${p.title}`:""}${p.linkedin?` · ${p.linkedin}`:""}`); if(p.notes) L.push(`  notes: ${p.notes}`); }); }
  if((o.rounds||[]).length){ L.push(""); L.push(`## Interview rounds so far`); o.rounds.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(r=>{ L.push(`- ${r.name||r.type||"Round"}${r.date?` (${fmtDate(r.date)})`:""}${r.status==="done"?" — done":""}${r.rating?` — went ${r.rating}/5`:""}`); if(r.debrief) L.push(`  debrief: ${r.debrief}`); }); }
  if(o.jd){ L.push(""); L.push(`## Job description`); L.push(o.jd); }
  else if(o.jdFile){ L.push(""); L.push(`## Job description`); L.push(`(attached as file: ${o.jdFile.name})`); }
  return L.join("\n");
}
function prepPrompt(o){
  const next=nextEvent(o);
  const who=(o.people||[]).map(p=>p.name+(p.title?` (${p.title})`:"")).join(", ");
  return buildBrief(o)+`\n\n---\nYou're my interview-prep coach. Based on the brief above, help me get ready for ${next?`my "${next.label}" round`:"my next round"} at ${o.company}.\n1) The 8 most likely questions they'll ask for this stage and role, with a crisp angle for how I should answer each.\n2) 6 sharp, non-generic questions I should ask${who?` ${who}`:" them"} that show I've done my homework on the product.\n3) Two things to emphasize about my background to fit this role.\n\nHere's my background:\n${resumeText()}`;
}
function introPrompt(o){
  return buildBrief(o)+`\n\n---\nUsing the brief above, write me a warm, confident 30-second self-introduction to open this interview at ${o.company} — tailored to the role and what they care about. Keep it natural and spoken, not corporate. Then give me a 2-sentence shorter version for a recruiter screen.\n\nMy background:\n${resumeText()}`;
}
function researchPrompt(o,p){
  return `Help me prep to meet an interviewer. Research this person and give me: a short summary of their background and career path, what they likely care about / focus on in interviews, any common ground I might build rapport on, and 4 thoughtful questions I could ask them.\n\nPerson: ${p.name}${p.title?` — ${p.title}`:""} at ${o.company}\nLinkedIn: ${p.linkedin||"(none provided — search for them)"}\n${p.notes?`What I already know: ${p.notes}\n`:""}Role I'm interviewing for: ${o.role||"(role)"}. Use web search if you can.`;
}

create table if not exists vaults (
  code text primary key,
  data jsonb not null,
  updated_at bigint not null default 0
);
alter table vaults enable row level security;

create or replace function get_vault(p_code text)
returns setof vaults language sql security definer set search_path = public as $$
  select * from vaults where code = p_code;
$$;

create or replace function set_vault(p_code text, p_data jsonb, p_updated bigint)
returns void language plpgsql security definer set search_path = public as $$
begin
  insert into vaults(code, data, updated_at) values (p_code, p_data, p_updated)

end;
$$;

grant execute on function get_vault(text)  to anon;

function connectSync(){
  const url=(document.querySelector('#syncUrl').value||"").trim();

}

function saveStages(){
  syncStageDraft();
  const cleaned = stageDraft.map(s=>({ id:s.id||("stg_"+uid()), name:(s.name||"").trim()||"Untitled", color:s.color||"#6366f1", active:true }));
  if(!cleaned.length){ toast("Keep at least one stage"); return; }
  state.stages = cleaned;
  // reassign any role whose stage no longer exists to the first stage
  const validIds = new Set(allStages().map(s=>s.id));
  state.opportunities.forEach(o=>{ if(!validIds.has(o.status)){ o.status=cleaned[0].id; o.updatedAt=Date.now(); } });
  stageDraft=null; save(); closeEditor(); render(); toast("Pipeline stages updated");
}

/* ============================ EVENT WIRING ============================ */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-view],[data-act],[data-open],[data-sort],[data-tab],[data-rating] .s,[data-del-round],[data-edit-round],[data-del-person],[data-edit-person],[data-research],[data-copy],[data-stageadd],[data-stagedel],[data-stagemove],[data-tile],[data-pickfile],[data-clearfile],[data-ics],[data-gcal],[data-dljd]");
  if(!t) return;

  // nav
  if(t.dataset.view){ view=t.dataset.view; searchQ=$("#search").value=""; activeFilter=null; render(); return; }
  if(t.dataset.act==="clear-filter"){ activeFilter=null; render(); return; }
  // table sort
  if(t.dataset.sort){ const k=t.dataset.sort; if(tableSort.key===k) tableSort.dir*=-1; else tableSort={key:k,dir:1}; render(); return; }
  // tabs
  if(t.dataset.tab){ drawerTab=t.dataset.tab; renderDrawer(); return; }
  // rating star pick
  if(t.matches("[data-rating] .s")){ const wrap=t.closest("[data-rating]"); const v=+t.dataset.v; wrap.parentElement.querySelector('input[type=hidden]').value=v; wrap.querySelectorAll(".s").forEach((s,i)=>s.classList.toggle("on",i<v)); return; }

  // open detail
  if(t.dataset.open){ openDetail(t.dataset.open); return; }

  const act=t.dataset.act;
  if(act==="add"){ openEditor(opForm(null)); return; }
  if(act==="edit-op"){ openEditor(opForm(getOp())); return; }
  if(act==="close-drawer"){ closeDrawer(); return; }
  if(act==="cancel-editor"){ closeEditor(); return; }
  if(act==="del-op"){ if(confirm("Delete "+getOp().company+" and all its rounds/people? This can't be undone.")){ state.opportunities=state.opportunities.filter(o=>o.id!==openId); save(); closeDrawer(); render(); toast("Deleted"); } return; }
  if(act==="add-round"){ openEditor(roundForm(null)); return; }
  if(act==="add-person"){ openEditor(personForm(null)); return; }
  if(act==="export"){ exportData(); return; }
  if(act==="import"){ $("#fileInput").click(); return; }
  if(act==="sample"){ loadSample(); return; }
  if(act==="settings"){ openSettings(); return; }
  if(act==="edit-stages"){ openStageEditor(); return; }
  if(act==="stage-save"){ saveStages(); return; }
  if(t.hasAttribute("data-stageadd")){ syncStageDraft(); stageDraft.push({id:"stg_"+uid(),name:"New stage",color:"#6366f1",active:true}); renderStageEditor(); return; }
  if(t.dataset.stagedel!=null){ syncStageDraft(); stageDraft.splice(+t.dataset.stagedel,1); renderStageEditor(); return; }
  if(t.dataset.stagemove){ syncStageDraft(); const [i,d]=t.dataset.stagemove.split("|").map(Number); const j=i+d; if(j>=0&&j<stageDraft.length){ const tmp=stageDraft[i]; stageDraft[i]=stageDraft[j]; stageDraft[j]=tmp; } renderStageEditor(); return; }
  if(t.dataset.tile){ applyTile(t.dataset.tile); return; }
  // résumé
  if(act==="edit-resume"){ openResume(); return; }
  if(act==="resume-upload"){ pickResumeFile(); return; }
  if(act==="resume-download"){ downloadData(state.resume&&state.resume.file); return; }
  if(act==="resume-removefile"){ if(state.resume){ delete state.resume.file; save(); openResume(); } return; }
  if(act==="resume-save"){ saveResume(); return; }
  if(act==="resume-pdf"){ printResume(); return; }
  // file fields (JD attach)
  if(t.dataset.pickfile){ pickFileInto(t.dataset.pickfile, t.dataset.accept||""); return; }
  if(t.dataset.clearfile){ const fld=t.dataset.clearfile; const h=document.querySelector(`[name="${fld}"]`); if(h)h.value=""; const lbl=document.querySelector(`[data-filename="${fld}"]`); if(lbl)lbl.innerHTML=""; return; }
  if(t.dataset.dljd){ const o=getOp(); if(o&&o.jdFile) downloadData(o.jdFile); return; }
  // calendar
  if(t.dataset.ics){ const f=findRound(t.dataset.ics); if(f) downloadICS(f.o,f.r); return; }
  if(t.dataset.gcal){ const f=findRound(t.dataset.gcal); if(f) window.open(googleCalUrl(f.o,f.r),"_blank","noopener"); return; }
  if(act==="sync-connect"){ connectSync(); return; }
  if(act==="sync-disconnect"){ if(confirm("Disconnect cloud sync on this device? Your data stays here; it just stops syncing.")){ sync={}; saveSync(); setSyncState("off"); openSettings(); } return; }
  if(act==="sync-gencode"){ const f=document.querySelector('#syncCode'); if(f) f.value=randomCode(); return; }
  if(act==="sync-pull"){ pullNow(); return; }
  if(act==="copy-sql"){ copy(SYNC_SQL,"SQL copied — paste into Supabase SQL editor"); return; }
  if(act==="copy-code"){ copy(sync.code||"", "Sync code copied"); return; }

  // round/person edit/delete
  if(t.dataset.editRound){ const r=getOp().rounds.find(x=>x.id===t.dataset.editRound); openEditor(roundForm(r)); editorEl.dataset.editId=r.id; return; }
  if(t.dataset.delRound){ const o=getOp(); o.rounds=o.rounds.filter(x=>x.id!==t.dataset.delRound); o.updatedAt=Date.now(); save(); renderDrawer(); render(); return; }
  if(t.dataset.editPerson){ const p=getOp().people.find(x=>x.id===t.dataset.editPerson); openEditor(personForm(p)); editorEl.dataset.editId=p.id; return; }
  if(t.dataset.delPerson){ const o=getOp(); o.people=o.people.filter(x=>x.id!==t.dataset.delPerson); o.updatedAt=Date.now(); save(); renderDrawer(); return; }
  if(t.dataset.research){ const o=getOp(); const p=o.people.find(x=>x.id===t.dataset.research); copy(researchPrompt(o,p),"Research prompt copied — paste into any AI"); return; }

  // copy brief prompts
  if(t.dataset.copy){ const o=getOp(); const map={brief:buildBrief(o),prep:prepPrompt(o),intro:introPrompt(o)}; copy(map[t.dataset.copy], t.dataset.copy==="brief"?"Brief copied":"Prompt copied"); return; }
});

function fd(form){ const d={}; new FormData(form).forEach((v,k)=>d[k]=typeof v==="string"?v.trim():v); return d; }
function saveOpForm(form){
  const d=fd(form);
  if(!d.company){ toast("Company name is required"); return; }
  d.tags=d.tags?d.tags.split(",").map(s=>s.trim()).filter(Boolean):[];
  d.excitement=+d.excitement||0;
  if(d.jdFile){ try{ d.jdFile=JSON.parse(d.jdFile); }catch(e){ delete d.jdFile; } } else { d.jdFile=null; }
  const existing=getOp();
  if(existing && editorEl && !editorEl.dataset.editId){ // editing the open op
    Object.assign(existing,d,{updatedAt:Date.now()});
  } else {
    const o={id:uid(),createdAt:Date.now(),updatedAt:Date.now(),rounds:[],people:[],offer:{},...d};
    state.opportunities.push(o); openId=o.id;
  }
  save(); closeEditor(); render();
  if(getOp()){ if(!$("#drawer").classList.contains("show")) openDetail(openId); else renderDrawer(); }
  toast("Saved");
}
function saveRoundForm(form){
  const d=fd(form); const o=getOp(); o.rounds=o.rounds||[];
  d.rating=+d.rating||0;
  const editId=editorEl&&editorEl.dataset.editId;
  if(editId){ Object.assign(o.rounds.find(r=>r.id===editId),d); }
  else { o.rounds.push({id:uid(),...d}); }
  o.updatedAt=Date.now(); save(); closeEditor(); renderDrawer(); render(); toast("Round saved");
}
function savePersonForm(form){
  const d=fd(form); if(!d.name){ toast("Name required"); return; }
  const o=getOp(); o.people=o.people||[];
  const editId=editorEl&&editorEl.dataset.editId;
  if(editId){ Object.assign(o.people.find(p=>p.id===editId),d); }
  else { o.people.push({id:uid(),...d}); }
  o.updatedAt=Date.now(); save(); closeEditor(); renderDrawer(); toast("Saved");
}

/* ============================ IMPORT / EXPORT ============================ */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  const d=new Date(); a.download=`callback-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
  a.click(); toast("Backup downloaded");
}
function importFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
    if(!data.opportunities) throw 0;
    if(state.opportunities.length && !confirm("Replace your current data with this backup? (Export first if unsure.)")) return;
    state=data; save(); render(); toast("Imported "+data.opportunities.length+" roles");
  }catch(e){ toast("⚠ That file didn't look like a Callback backup"); } };
  r.readAsText(file);
}

/* ============================ COPY / TOAST ============================ */
function copy(text,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>toast(msg||"Copied"),()=>fallbackCopy(text,msg)); }
  else fallbackCopy(text,msg);
}
function fallbackCopy(text,msg){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy"); toast(msg||"Copied");}catch(e){toast("Press ⌘/Ctrl+C to copy");} ta.remove(); }
let toastT;
function toast(msg){ const t=$("#toast"); t.innerHTML=`${I.check}<span>${esc(msg)}</span>`; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2400); }

/* ============================ FILES (JD / résumé attachments) ============================ */
function fileToData(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res({name:file.name,type:file.type||"application/octet-stream",size:file.size,data:r.result}); r.onerror=rej; r.readAsDataURL(file); }); }
function downloadData(f){ if(!f||!f.data) return; const a=document.createElement("a"); a.href=f.data; a.download=f.name||"file"; document.body.appendChild(a); a.click(); a.remove(); }
function fileSizeStr(n){ if(!n) return ""; return n<1024?n+" B":n<1048576?(n/1024).toFixed(0)+" KB":(n/1048576).toFixed(1)+" MB"; }
// generic file picker that stashes the chosen file's data into a hidden form input (name=field) + shows the filename
async function pickFileInto(field, accept){
  const inp=document.createElement("input"); inp.type="file"; if(accept) inp.accept=accept;
  inp.onchange=async()=>{ const file=inp.files[0]; if(!file) return;
    if(file.size>4*1024*1024){ toast("⚠ File too big (max ~4MB)"); return; }
    const f=await fileToData(file);
    const hidden=document.querySelector(`[name="${field}"]`); if(hidden) hidden.value=JSON.stringify(f);
    const lbl=document.querySelector(`[data-filename="${field}"]`); if(lbl) lbl.innerHTML=`📎 ${esc(f.name)} <span style="color:var(--faint)">${fileSizeStr(f.size)}</span> · <span data-clearfile="${field}" style="color:var(--bad);cursor:pointer">remove</span>`;
  };
  inp.click();
}

  const r=state.resume||{};
  openEditor(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:36px;height:36px;border-radius:11px;background:var(--grad);display:grid;place-items:center">${I.user}</div>
      <h2 style="margin:0;font-size:18px;font-weight:850">My résumé</h2>
      <button class="x-btn" data-act="cancel-editor" style="margin-left:auto">${I.x}</button>
    </div>
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 16px">Keep your latest résumé here. The <b>summary text</b> auto-fills your AI brief prompts so you never paste it manually. Attach the file to download it anytime, on any synced device.</p>
    <div class="form-row"><label>Résumé file</label>
      <div id="resumeFileRow">${r.file?`<div class="sub-item" style="display:flex;align-items:center;gap:8px;margin:0"><span style="flex:1">📄 ${esc(r.file.name)} <span style="color:var(--faint)">${fileSizeStr(r.file.size)}</span></span><button class="btn sm ghost" data-act="resume-download">↓ Download</button><button class="x-btn danger" data-act="resume-removefile">${I.trash}</button></div>`:`<button class="btn ghost sm" data-act="resume-upload">↑ Upload résumé (PDF/DOC)</button>`}</div>
    </div>
    <div class="form-row"><label>Résumé summary text <span style="color:var(--faint);font-weight:500">— used in AI prompts</span></label>
      <textarea id="resumeText" style="min-height:160px" placeholder="Paste your résumé as text, or a tight summary of your experience, skills and wins…">${esc(r.text||"")}</textarea></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn primary sm" data-act="resume-save">${I.check} Save</button>
      <button class="btn ghost sm" data-act="resume-pdf">⎙ Save text as PDF</button>
    </div>`);
}
function pickResumeFile(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".pdf,.doc,.docx,.txt,.rtf,.pages";
  inp.onchange=async()=>{ const file=inp.files[0]; if(!file) return;
    if(file.size>4*1024*1024){ toast("⚠ File too big (max ~4MB)"); return; }
    state.resume=state.resume||{}; state.resume.file=await fileToData(file); save(); openResume(); toast("Résumé attached"); };
  inp.click();
}
function saveResume(){
  state.resume=state.resume||{};
  const ta=document.querySelector('#resumeText'); if(ta) state.resume.text=ta.value.trim();
  save(); closeEditor(); toast("Résumé saved");
}
function printResume(){
  const txt=(document.querySelector('#resumeText')?document.querySelector('#resumeText').value:(state.resume&&state.resume.text))||"";
  if(!txt.trim()){ toast("Add some résumé text first"); return; }
  const w=window.open("","_blank");
  if(!w){ toast("Allow pop-ups to save as PDF"); return; }
  w.document.write(`<html><head><title>Résumé</title><style>body{font:13px/1.6 -apple-system,Segoe UI,Roboto,sans-serif;max-width:720px;margin:40px auto;padding:0 24px;color:#111;white-space:pre-wrap}@media print{body{margin:0}}</style></head><body>${esc(txt)}</body></html>`);
  w.document.close(); setTimeout(()=>{ w.focus(); w.print(); }, 250);
}

/* ============================ CALENDAR (.ics / Google) ============================ */
function pad2(n){ return String(n).padStart(2,"0"); }
function icsStamp(date,time,addMin){
  // date "YYYY-MM-DD", time "HH:MM" -> local time components (floating, no TZ) so it lands at the shown wall-clock time
  const [y,m,d]=date.split("-").map(Number); let [hh,mm]=(time||"09:00").split(":").map(Number);
  let dt=new Date(y,(m-1),d,hh||9,mm||0); if(addMin) dt=new Date(dt.getTime()+addMin*60000);
  return `${dt.getFullYear()}${pad2(dt.getMonth()+1)}${pad2(dt.getDate())}T${pad2(dt.getHours())}${pad2(dt.getMinutes())}00`;
}
function eventTitle(o,r){ return `${r.name||r.type||"Interview"} — ${o.company}`; }
function eventDesc(o,r){ return [r.type?("Type: "+r.type):"", r.interviewers?("With: "+r.interviewers):"", r.link?("Link: "+r.link):"", o.role?("Role: "+o.role):"", r.prep?("Prep: "+r.prep):""].filter(Boolean).join("\\n"); }
function downloadICS(o,r){
  if(!r.date){ toast("Add a date to this round first"); return; }
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Callback//Interview//EN","BEGIN:VEVENT",
    "UID:"+(r.id||uid())+"@callback","SUMMARY:"+eventTitle(o,r).replace(/[\n,;]/g," "),
    "DTSTART:"+icsStamp(r.date,r.time), "DTEND:"+icsStamp(r.date,r.time,60),
    "DESCRIPTION:"+eventDesc(o,r), r.link?("URL:"+r.link):"", "LOCATION:"+(r.link||"").replace(/[\n,;]/g," "),
    "BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:"+eventTitle(o,r),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"].filter(Boolean).join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=(o.company+"-"+(r.name||r.type||"interview")).replace(/[^\w-]+/g,"_")+".ics";
  document.body.appendChild(a); a.click(); a.remove(); toast("Calendar file downloaded — open it to add");
}
function findRound(rid){ for(const o of state.opportunities){ const r=(o.rounds||[]).find(x=>x.id===rid); if(r) return {o,r}; } return null; }
function googleCalUrl(o,r){
  const p=new URLSearchParams({action:"TEMPLATE", text:eventTitle(o,r),
    dates:icsStamp(r.date,r.time)+"/"+icsStamp(r.date,r.time,60),
    details:eventDesc(o,r).replace(/\\n/g,"\n"), location:r.link||""});
  return "https://calendar.google.com/calendar/render?"+p.toString();
}
