<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>CallBack — Interview Tracker</title>

<!-- PWA / "Add to Home Screen" -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CallBack" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0b0e" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<style>
:root{
  --bg:#0a0b0e; --bg2:#101216; --panel:#131519; --panel2:#191c22;
  --line:#23262e; --line2:#2f333c;
  --txt:#e9eaed; --muted:#9a9ea8; --faint:#666b75;
  --accent:#5e6ad2; --accent2:#8b93de; --accent3:#a6abe6;
  --good:#4ea381; --warn:#c6a45c; --bad:#d06b6b; --hot:#cf7273;
  --radius:15px; --radius-sm:11px;
  --shadow:0 14px 44px -18px rgba(0,0,0,.72);
  --grad:linear-gradient(180deg,#6b75d6,#5560c9);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1100px 640px at 82% -16%, rgba(94,106,210,.07), transparent 60%),
    var(--bg);
  color:var(--txt);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  font-feature-settings:"cv02","cv03","ss01"; letter-spacing:-.005em;
}
::selection{background:rgba(94,106,210,.35)}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--accent2);text-decoration:none}
input,select,textarea{
  width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
  border-radius:var(--radius-sm);padding:11px 12px;outline:none;transition:border .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,106,210,.18)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px 2px;font-weight:600;letter-spacing:.02em}
.scroll::-webkit-scrollbar{width:10px;height:10px}
.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:10px;border:2px solid var(--bg)}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:230px;flex:0 0 230px;padding:20px 14px;border-right:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),rgba(16,18,22,.4));
  display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .logo{width:36px;height:36px;border-radius:10px;overflow:hidden;display:grid;place-items:center}
.brand .logo img{width:36px;height:36px;object-fit:cover;border-radius:10px}
.brand .logo svg{width:22px;height:22px}
.brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.02em}
.brand small{display:block;color:var(--faint);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:var(--muted);font-weight:600;transition:.15s;width:100%;text-align:left}
.nav-btn svg{width:19px;height:19px;flex:0 0 19px;opacity:.85}
.nav-btn:hover{background:var(--panel);color:var(--txt)}
.nav-btn.active{background:rgba(94,106,210,.13);color:#fff;box-shadow:inset 0 0 0 1px rgba(94,106,210,.28)}
.nav-btn .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:1px 8px;min-width:20px;text-align:center}
.nav-btn .badge.alert{background:var(--hot)}
.side-spacer{flex:1}
.side-foot{display:flex;flex-direction:column;gap:6px;padding-top:10px;border-top:1px solid var(--line)}
.mini-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:var(--faint);font-size:13px;font-weight:600;transition:.15s}
.mini-btn:hover{background:var(--panel);color:var(--muted)}
.mini-btn svg{width:16px;height:16px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:16px 26px;
  background:linear-gradient(180deg,rgba(10,11,14,.92),rgba(10,11,14,.72));backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.view-title{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0;display:flex;align-items:center;gap:9px}
.view-title .vt-ico{display:inline-flex}
.view-title .vt-ico svg{width:20px;height:20px;color:var(--accent3)}
.view-sub{color:var(--faint);font-size:12.5px;margin-top:1px}
.view-sub:empty{display:none}
.search{position:relative;flex:1;max-width:420px;margin-left:8px}
.search input{padding-left:38px;background:var(--panel)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;font-weight:700;font-size:14px;transition:.15s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn.primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.35)}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{background:var(--panel2);color:var(--txt);box-shadow:inset 0 0 0 1px var(--line)}
.btn.ghost:hover{background:var(--line);box-shadow:inset 0 0 0 1px var(--line2)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn.danger{color:var(--bad)}
.btn.danger:hover{background:rgba(208,107,107,.12)}
@media(max-width:620px){ .hide-sm{display:none} .topbar .btn{padding:10px 12px} }

.content{padding:24px 26px 90px;flex:1}
.content.pad0{padding:0 0 90px}

/* ---------- Cards / generic ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
.grid-2{grid-template-columns:1fr 1fr}
@media(max-width:860px){ .grid-2{grid-template-columns:1fr} }
.stat{padding:18px;border-radius:var(--radius);background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);position:relative;overflow:hidden}
.stat .ico{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(94,106,210,.14);color:var(--accent3)}
.stat .ico svg{width:18px;height:18px}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.1;font-variant-numeric:tabular-nums}
.stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:6px}
.stat .sub{color:var(--faint);font-size:11.5px;margin-top:7px;line-height:1.45}
.stat.hot .ico{background:rgba(207,114,115,.16);color:var(--hot)}
.stat.hot .num{color:var(--hot)}
.stat[data-tile]{cursor:pointer}
.stat[data-tile]:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat[data-tile]:active{transform:translateY(0)}
.stat .tile-go{position:absolute;right:14px;bottom:12px;color:var(--faint);font-size:15px;font-weight:800;opacity:0;transition:.15s}
.stat[data-tile]:hover .tile-go{opacity:1;color:var(--accent3)}

.section-head{display:flex;align-items:center;gap:10px;margin:26px 2px 14px}
.section-head h3{font-size:15px;font-weight:800;margin:0;letter-spacing:.01em}
.section-head .line{flex:1;height:1px;background:var(--line)}
.section-head .tag{font-size:11px;color:var(--faint);font-weight:700}

.panel{padding:18px}
.panel-title{font-weight:800;font-size:14px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.panel-title svg{width:16px;height:16px;color:var(--accent3)}

/* chips */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.tag-chip{background:rgba(94,106,210,.12);color:var(--accent3);border-color:rgba(94,106,210,.25)}

.empty{display:grid;place-items:center;text-align:center;padding:60px 20px;color:var(--faint)}
.empty .big{width:64px;height:64px;border-radius:18px;background:var(--panel);display:grid;place-items:center;margin-bottom:16px;box-shadow:var(--shadow)}
.empty .big svg{width:30px;height:30px;color:var(--accent3)}
.empty .big.brand{background:transparent;box-shadow:none;width:84px;height:84px}
.empty .big.brand img{width:84px;height:84px;border-radius:21px;box-shadow:var(--shadow)}
.welcome-feats{display:flex;flex-direction:column;gap:9px;margin-top:18px;width:100%;max-width:420px;text-align:left}
.wf{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.wf>span{width:34px;height:34px;border-radius:10px;background:rgba(94,106,210,.13);display:grid;place-items:center;flex:0 0 34px}
.wf>span svg{width:18px;height:18px;color:var(--accent3)}
.wf b{font-size:13.5px;font-weight:750;display:block;color:var(--txt)}
.wf small{font-size:12px;color:var(--muted);line-height:1.45}

/* ---------- Dashboard hero (the visual hook) ---------- */
.hero{position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--line);background:linear-gradient(135deg,#16131f,#0c0b12);margin-bottom:18px}
.hero-aurora{position:absolute;inset:-45%;z-index:0;opacity:.9;filter:blur(22px);
  background:
   radial-gradient(38% 48% at 18% 28%, rgba(94,106,210,.50), transparent 62%),
   radial-gradient(40% 50% at 82% 16%, rgba(139,124,221,.40), transparent 62%),
   radial-gradient(52% 60% at 65% 95%, rgba(78,120,180,.32), transparent 62%);
  animation:aurora 17s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:translate(0,0) scale(1)}50%{transform:translate(4%,3%) scale(1.1)}100%{transform:translate(-3%,-2%) scale(1.05)}}
@media (prefers-reduced-motion:reduce){ .hero-aurora{animation:none} }
.hero-grain{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.6;
  background:radial-gradient(1px 1px at 22% 32%, rgba(255,255,255,.05), transparent),radial-gradient(1px 1px at 72% 62%, rgba(255,255,255,.04), transparent),radial-gradient(1px 1px at 48% 80%, rgba(255,255,255,.04), transparent)}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;gap:18px;padding:22px 24px}
.hero-main{flex:1;min-width:0}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--accent3)}
.hero-eyebrow svg{width:14px;height:14px}
.hero-co{display:flex;align-items:center;gap:12px;margin-top:11px}
.hero-fav{width:46px!important;height:46px!important;flex:0 0 46px!important;border-radius:13px!important;font-size:18px!important}
.hero-name{font-size:24px;font-weight:850;letter-spacing:-.02em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-role{font-size:13px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-when{font-size:12.5px;color:var(--accent3);font-weight:600;margin-top:10px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}
.hero-btn{background:rgba(255,255,255,.06)!important;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)!important;color:#fff!important}
.hero-count{flex:0 0 auto;text-align:center;padding-left:8px}
.hc-num{font-size:62px;font-weight:850;line-height:.9;letter-spacing:-.03em;background:linear-gradient(180deg,#ffffff,#aeb4ea);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 20px rgba(94,106,210,.55))}
.hc-num.now{font-size:38px}
.hc-num.clock{font-size:33px;letter-spacing:-.01em;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.hc-unit{font-size:10.5px;color:var(--accent3);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.hero-tint{position:absolute;inset:-30%;z-index:0;filter:blur(26px);opacity:.9;mix-blend-mode:screen;pointer-events:none}
.hero-mark{position:absolute;right:-36px;top:50%;transform:translateY(-50%);width:170px;height:170px;border-radius:42px;z-index:0;opacity:.06;pointer-events:none}
@media(max-width:560px){ .hero-inner{padding:18px;gap:12px} .hc-num{font-size:50px} .hc-num.now{font-size:30px} .hc-num.clock{font-size:25px} .hero-name{font-size:20px} .hero-fav{width:40px!important;height:40px!important;flex-basis:40px!important} .hero-mark{width:128px;height:128px;right:-28px} }

/* Branded launch splash (installed app only — see media query) */
#splash{display:none;position:fixed;inset:0;z-index:9999;background:
  radial-gradient(900px 520px at 50% 22%, rgba(94,106,210,.10), transparent 60%), var(--bg);
  place-items:center;transition:opacity .45s ease,visibility .45s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-inner{display:flex;flex-direction:column;align-items:center;gap:13px;animation:sppop .55s cubic-bezier(.2,.7,.2,1)}
#splash img{width:88px;height:88px;border-radius:23px;box-shadow:var(--shadow)}
.sp-name{font-size:27px;font-weight:850;letter-spacing:-.02em;color:var(--txt)}
.sp-tag{font-size:12.5px;color:var(--accent3);font-weight:600;letter-spacing:.05em}
@keyframes sppop{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:none}}
@media (display-mode:standalone){ #splash{display:grid} }
/* brand mark in the mobile top bar (the desktop sidebar logo is hidden there) */
.topbar-brand{display:none;width:38px;height:38px;border-radius:11px;flex:0 0 auto;cursor:pointer;transition:transform .12s}
.topbar-brand:active{transform:scale(.9)}
.empty h3{color:var(--txt);margin:0 0 6px;font-size:18px}

/* ---------- Kanban ---------- */
.board{display:flex;gap:14px;padding:18px 26px;overflow-x:auto;align-items:flex-start}
.col{flex:0 0 270px;width:270px;background:linear-gradient(180deg,var(--bg2),rgba(16,18,22,.3));border:1px solid var(--line);border-radius:var(--radius);max-height:calc(100vh - 180px);display:flex;flex-direction:column}
.col.drop{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,106,210,.18)}
.col-head{padding:13px 14px 10px;display:flex;align-items:center;gap:9px;position:sticky;top:0}
.col-head .dot{width:9px;height:9px;border-radius:50%}
.col-head .nm{font-weight:800;font-size:13px}
.col-head .ct{margin-left:auto;color:var(--faint);font-size:12px;font-weight:700;background:var(--panel);padding:1px 8px;border-radius:999px}
.col-body{padding:4px 10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
.kcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;position:relative}
.kcard:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.kcard.dragging{opacity:.5}
.kcard{padding:14px}
.kcard .co{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
/* default avatar — sized so the favicon/initial always renders as a clean box, even in contexts (dashboard lists) with no override */
.fav{position:relative;width:36px;height:36px;border-radius:10px;flex:0 0 36px;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;overflow:hidden}
.fav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fav > span{position:absolute;inset:0;display:grid;place-items:center}
.kcard .fav{width:26px;height:26px;border-radius:8px;flex:0 0 26px;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;overflow:hidden}
.kcard .fav img{width:100%;height:100%;object-fit:cover}
.kcard .cn{font-weight:800;font-size:13.5px;line-height:1.3}
.kcard .rl{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4}
.kcard .meta{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
.kcard .stars{color:var(--warn);font-size:11px;letter-spacing:1px}
.kcard .next{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent2);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.kcard .next svg{width:13px;height:13px}
.kcard .next.soon{color:var(--warn)}
.kcard .next.over{color:var(--bad)}
.kcard .flag{position:absolute;top:10px;right:10px;font-size:13px}
.flag.dot{width:8px;height:8px;border-radius:50%;top:12px;right:12px;box-shadow:0 0 0 3px var(--panel)}
.flag.dot.warn{background:var(--warn)} .flag.dot.good{background:var(--good)}
.mini-flag{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:1px;margin-left:5px}
.mini-flag.warn{background:var(--warn)} .mini-flag.good{background:var(--good)}

/* ---------- Table ---------- */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:760px}
thead th{text-align:left;padding:13px 14px;color:var(--faint);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:var(--bg2);border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--muted)}
tbody tr{border-bottom:1px solid var(--line);transition:.12s;cursor:pointer}
tbody tr:hover{background:var(--panel2)}
tbody td{padding:12px 14px;vertical-align:middle}
.cell-co{display:flex;align-items:center;gap:10px}
.cell-co .fav{width:30px;height:30px;border-radius:9px;flex:0 0 30px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;overflow:hidden}
.cell-co .fav img{width:100%;height:100%;object-fit:cover}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:800;white-space:nowrap}
.pill .dot{width:7px;height:7px;border-radius:50%}

/* ---------- Charts ---------- */
.chart-grid{grid-template-columns:1.4fr 1fr}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .nm{width:120px;flex:0 0 120px;font-size:12.5px;color:var(--muted);font-weight:600;text-align:right}
.bar-track{flex:1;height:24px;background:var(--bg2);border-radius:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;font-size:11.5px;font-weight:800;color:#fff;min-width:24px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.legend{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.legend-row{display:flex;align-items:center;gap:9px;font-size:13px}
.legend-row .dot{width:11px;height:11px;border-radius:4px;flex:0 0 11px}
.legend-row .v{margin-left:auto;font-weight:800;color:var(--muted)}

/* ---------- Timeline (Upcoming › swimlanes) ---------- */
.cal-toggle{display:inline-flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:16px}
.cal-toggle .seg{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:none;background:none;color:var(--muted);font-weight:700;font-size:12.5px;cursor:pointer}
.cal-toggle .seg svg{width:15px;height:15px}
.cal-toggle .seg.on{background:var(--accent);color:#fff}
/* month grid */
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:800;letter-spacing:-.01em;min-width:148px}
.cal-nav{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--panel2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--line)}
.cal-nav:hover{background:var(--line);color:var(--txt)}
.cal-nav svg{width:16px;height:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;padding:2px 0 6px}
.cal-cell{min-height:88px;border:1px solid var(--line);border-radius:10px;padding:6px 6px 5px;background:var(--panel);display:flex;flex-direction:column;gap:4px;overflow:hidden}
.cal-cell.has{cursor:pointer}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.has:hover{border-color:var(--line2)}
.cal-cell.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.cal-cell.sel{border-color:var(--accent3);box-shadow:inset 0 0 0 1px var(--accent3)}
.cal-dnum{font-size:12px;font-weight:700;color:var(--muted)}
.cal-cell.today .cal-dnum{color:var(--accent3)}
.cal-evs{display:flex;flex-direction:column;gap:3px;min-width:0}
.cal-ev{font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.55}
.cal-more{font-size:9.5px;color:var(--faint);font-weight:700;padding-left:2px}
.cal-dots{display:none;gap:3px;flex-wrap:wrap;margin-top:1px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-detail{margin-top:20px}
.cal-detail-h{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 2px 11px}
@media(max-width:720px){
  .cal-grid{gap:4px}
  .cal-cell{min-height:46px;padding:4px;border-radius:8px;gap:2px}
  .cal-evs{display:none}
  .cal-dots{display:flex}
  .cal-dnum{font-size:11px;text-align:center}
  .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--accent)}
}
.timeline{overflow:hidden}
.tl-legend{display:flex;flex-wrap:wrap;gap:13px;font-size:11.5px;color:var(--muted);margin:0 2px 14px;align-items:center}
.tl-legend span{display:inline-flex;align-items:center;gap:5px}
.tl-legend i.lg{width:11px;height:11px;border-radius:50%;display:inline-block}
.tl-legend i.lg.done{background:#9aa6c2}
.tl-legend i.lg.upcoming{background:transparent;border:2px solid #9aa6c2}
.tl-legend i.lg.applied{background:var(--muted)}
.tl-legend i.lg.cancelled{background:var(--faint);opacity:.5}
.tl-legend i.lg.offer{border:none;color:var(--warn);width:auto;height:auto;font-size:12px}
.tl-nowkey:before{content:"";width:0;height:13px;border-left:1.5px dashed var(--accent2);margin-right:4px}
.tl-axis{position:relative;height:18px;margin-bottom:8px;border-bottom:1px solid var(--line)}
.tl-tick{position:absolute;top:1px;transform:translateX(-50%);font-size:10.5px;color:var(--faint);font-weight:700;white-space:nowrap}
.tl-tick:after{content:"";position:absolute;left:50%;top:16px;width:1px;height:5px;background:var(--line)}
.tl-body{position:relative}
.tl-now{position:absolute;top:0;bottom:0;width:0;border-left:1.5px dashed var(--accent2);opacity:.45;z-index:0}
.tl-row{position:relative;padding:9px 0;border-bottom:1px solid var(--line);z-index:1}
.tl-row:last-child{border-bottom:none}
.tl-row.closed{opacity:.5}
.tl-head{display:flex;align-items:center;gap:8px;margin-bottom:11px;min-width:0}
.tl-swatch{width:11px;height:11px;border-radius:3px;flex:0 0 11px}
.tl-co{font-weight:800;font-size:13.5px;cursor:pointer;white-space:nowrap}
.tl-role{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tl-track{position:relative;height:18px;margin-bottom:18px}
.tl-line{position:absolute;top:50%;transform:translateY(-50%);height:2.5px;border-radius:2px}
.tl-line.dashed{height:0;background:none}
.tl-dot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;background:var(--c);box-shadow:0 0 0 3px var(--bg);z-index:2;display:grid;place-items:center;line-height:1}
.tl-dot.upcoming,.tl-dot.pending{background:var(--bg);border:2.5px solid var(--c)}
.tl-dot.pending{opacity:.65}
.tl-dot.applied{width:10px;height:10px}
.tl-dot.cancelled{background:var(--faint);opacity:.45;width:10px;height:10px;box-shadow:0 0 0 3px var(--bg)}
.tl-dot.task{width:9px;height:9px;background:var(--bg);border:2px solid var(--accent2)}
.tl-dot.offer{background:none;box-shadow:none;color:var(--warn);width:auto;height:auto;font-size:15px}
.tl-dot:hover{filter:brightness(1.18)}
.tl-lbl{position:absolute;top:calc(50% + 12px);transform:translateX(-50%);font-size:10px;color:var(--faint);white-space:nowrap;pointer-events:none;max-width:96px;overflow:hidden;text-overflow:ellipsis}
@media(max-width:720px){ .tl-lbl{display:none} .tl-track{margin-bottom:4px} .tl-role{display:none} }

/* ---------- Modal / Drawer ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:100;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;height:100dvh;width:min(560px,100vw);background:var(--bg2);border-left:1px solid var(--line);z-index:101;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.3,.9,.3,1);display:flex;flex-direction:column;box-shadow:-30px 0 60px -20px rgba(0,0,0,.6)}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:5}
.drawer-body{padding:20px;overflow-y:auto;flex:1}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--bg2)}
.x-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--panel);color:var(--muted)}
.x-btn:hover{background:var(--panel2);color:var(--txt)}
.x-btn svg{width:18px;height:18px}

.tabs{display:flex;gap:4px;padding:4px;background:var(--panel);border-radius:12px;margin-bottom:18px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
.tab.active{background:var(--panel2);color:#fff;box-shadow:inset 0 0 0 1px var(--line2)}

.form-row{margin-bottom:14px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.rating-pick{display:flex;gap:6px}
.rating-pick .s{font-size:22px;cursor:pointer;color:var(--line2);transition:.1s}
.rating-pick .s.on{color:var(--warn)}

.sub-item{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px;line-height:1.5}
.sub-item .si-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.sub-item .si-head .nm{font-weight:800;font-size:13.5px;line-height:1.4}
.sub-item .si-head .nm + div{margin-top:3px;line-height:1.45}
.sub-item .si-head .del{margin-left:auto;color:var(--faint);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:0 0 26px}
.sub-item .si-head .del:hover{color:var(--bad);background:rgba(208,107,107,.1)}
.sub-item .si-meta{color:var(--muted);font-size:12px;display:flex;gap:6px 14px;flex-wrap:wrap;line-height:1.6}
.add-sub{width:100%;padding:11px;border:1.5px dashed var(--line2);border-radius:12px;color:var(--muted);font-weight:700;font-size:13px;transition:.15s}
.add-sub:hover{border-color:var(--accent);color:var(--accent3);background:rgba(94,106,210,.06)}
.tab-empty{text-align:center;padding:30px 18px 24px}
.tab-empty .te-ico{width:48px;height:48px;border-radius:14px;background:rgba(94,106,210,.12);display:grid;place-items:center;margin:0 auto 13px;color:var(--accent3)}
.tab-empty .te-ico svg{width:23px;height:23px}
.tab-empty .te-title{font-weight:800;font-size:15px;margin-bottom:5px}
.tab-empty .te-sub{font-size:12.5px;color:var(--faint);max-width:290px;margin:0 auto;line-height:1.55}

.ai-box{background:linear-gradient(160deg,rgba(94,106,210,.1),rgba(94,106,210,.06));border:1px solid rgba(94,106,210,.3);border-radius:14px;padding:16px;margin-bottom:14px}
.ai-box .ai-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;font-weight:800;font-size:13.5px}
.ai-box .ai-head svg{width:18px;height:18px;color:var(--accent3)}
.ai-pre{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;font:12px/1.6 ui-monospace,Menlo,Consolas,monospace;color:var(--muted);white-space:pre-wrap;max-height:260px;overflow:auto;margin-bottom:10px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line2);color:var(--txt);
  padding:12px 18px;border-radius:12px;font-weight:700;font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:.25s;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--good)}

.detail-hero{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.detail-hero .fav{width:48px;height:48px;border-radius:13px;flex:0 0 48px;display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;overflow:hidden}
.detail-hero .fav img{width:100%;height:100%;object-fit:cover}
.detail-hero h2{margin:0;font-size:19px;font-weight:850;letter-spacing:-.02em;line-height:1.3}
.detail-hero .rl{color:var(--muted);font-size:13.5px;margin-top:4px;line-height:1.4}
.kv{display:grid;grid-template-columns:auto 1fr;gap:12px 16px;font-size:13.5px;margin:16px 0;line-height:1.5}
.kv dt{color:var(--faint);font-weight:600}
.kv dd{margin:0;font-weight:600;line-height:1.5}
.note-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.6;color:var(--muted);white-space:pre-wrap;margin-bottom:12px}

.mobile-nav{display:none}

.pipe-bar{display:flex;align-items:center;gap:12px;padding:14px 26px 10px}

@media(max-width:860px){
  html,body{overflow-x:hidden;max-width:100vw}
  .sidebar{display:none}
  .chart-grid{grid-template-columns:1fr}
  /* breathing room top & bottom incl. iOS safe areas */
  .topbar{padding:calc(10px + env(safe-area-inset-top)) 16px 12px;gap:10px;flex-wrap:wrap}
  .content{padding:16px 16px calc(96px + env(safe-area-inset-bottom))}
  .content.pad0{padding:0 0 calc(96px + env(safe-area-inset-bottom))}
  .topbar-brand{display:block}
  .view-title{font-size:18px}
  .view-sub{font-size:11.5px}
  .search{order:5;max-width:none;flex:1 1 100%;margin:2px 0 0}
  .btn.primary{padding:10px 14px}
  #settingsBtn{flex:0 0 auto}
  .form-2,.form-3{grid-template-columns:1fr}
  /* Pipeline stacks vertically — no sideways scrolling */
  .pipe-bar{padding:14px 16px 8px}
  .board{flex-direction:column;overflow-x:hidden;padding:12px 14px;gap:16px}
  .col{flex:1 1 auto;width:100%;max-width:100%;max-height:none}
  .col-body{max-height:none;overflow:visible}
  /* Cards view is a responsive grid (see renderCards) so nothing scrolls sideways */
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(16,18,22,.97);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:7px 4px calc(7px + env(safe-area-inset-bottom));justify-content:space-around}
  .mnav{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 10px;border-radius:10px;color:var(--faint);font-size:10px;font-weight:700;flex:1}
  .mnav svg{width:21px;height:21px}
  .mnav.active{color:var(--accent3)}
  .drawer{width:100vw}
  .drawer-head{padding:calc(14px + env(safe-area-inset-top)) 16px 14px}
  .drawer-foot{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .kv{grid-template-columns:1fr}
  .kv dt{margin-top:6px}
  .section-head{margin:22px 2px 12px}
}
@media(max-width:380px){ .stat-grid{grid-template-columns:1fr 1fr} }

/* Role cards (mobile table replacement) */
.role-card{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;cursor:pointer;transition:.15s}
.role-card:active{transform:scale(.99)}
.role-card .body{flex:1;min-width:0}
.role-card .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-card .cn{font-weight:800;font-size:14.5px;line-height:1.35}
.role-card .rl{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.4}
.role-card .ln{display:flex;align-items:center;gap:8px 10px;margin-top:9px;flex-wrap:wrap;font-size:11.5px;color:var(--faint);line-height:1.5}

/* ---------- Job Cards view ---------- */
.cards-sorts{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.job-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:13px}
.job-card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.job-card:active{transform:scale(.995)}
.jc-head{display:flex;align-items:center;gap:12px}
.jc-id{flex:1;min-width:0}
.jc-co{font-weight:850;font-size:16px;letter-spacing:-.01em;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jc-role{color:var(--muted);font-size:12.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jc-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
.jc-tag.good{background:rgba(78,163,129,.16);color:var(--good)}
.jc-tag.warn{background:rgba(198,164,92,.16);color:var(--warn)}
.jc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:13px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.jc-stat{min-width:0}
.jc-stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:800}
.jc-stat .v{font-size:14.5px;font-weight:750;margin-top:5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jc-stat .v.sm{font-size:13px}
.jc-sub{font-size:11px;color:var(--faint);font-weight:600;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jc-contacts{display:flex;align-items:center;gap:8px;min-width:0;margin-top:5px}
.jc-avs{display:flex;align-items:center;flex:0 0 auto}
.jc-av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:9.5px;font-weight:800;color:#fff;border:2px solid var(--panel);overflow:hidden;position:relative;margin-left:-7px}
.jc-av:first-child{margin-left:0}
.jc-av img{width:100%;height:100%;object-fit:cover}
.jc-av.more{background:var(--panel2);color:var(--muted)}
.jc-cnames{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px;font-weight:700;color:var(--muted)}
.jc-foot{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
.jc-foot .stars{font-size:12px}
.jc-dot{color:var(--faint)}
.jc-tagline{font-size:11px;color:var(--accent3);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ask-box{margin-bottom:18px}
.ask-chips{display:flex;gap:7px;flex-wrap:wrap}
.ask-chips .chip{cursor:pointer}
.ask-chips .chip:hover{border-color:var(--accent);color:var(--txt)}
.ai-keylinks{font-size:12px;color:var(--muted);margin:-2px 2px 12px;line-height:1.7;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.ai-keylinks a{color:var(--accent3);font-weight:700;white-space:nowrap}
.ai-subhead{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--accent3);margin:18px 0 9px;padding-top:14px;border-top:1px solid var(--line)}
.ai-subhead svg{width:15px;height:15px}

/* Next moves — unified action hub */
.move{display:flex;align-items:center;gap:11px;flex-wrap:wrap;padding:11px 12px;border-radius:12px;cursor:pointer;transition:.12s}
.move:hover{background:var(--panel2)}
.move+.move{border-top:1px solid var(--line)}
.move-ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 30px}
.move-ico svg{width:16px;height:16px}
.move-fav{width:28px!important;height:28px!important;flex:0 0 28px!important;border-radius:8px!important;font-size:11px!important}
.move-body{flex:1 1 130px;min-width:0}
.move-label{font-weight:750;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-co{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.move-due{font-size:11.5px;font-weight:800;flex:0 0 auto;white-space:nowrap}
.move-actions{display:flex;gap:6px;flex:0 0 auto}
@media(max-width:560px){ .move-actions{flex:1 1 100%;order:5;padding-left:41px} .move{gap:9px} }

/* ---------- Company brief (drawer) ---------- */
.brief-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
.brief-head{display:flex;align-items:center;gap:12px}
.brief-co{font-weight:850;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brief-tag{color:var(--accent3);font-size:12.5px;font-weight:600;margin-top:2px;font-style:italic;line-height:1.35}
.brief-dom{font-size:12px;margin-top:2px}
.brief-body{font-size:13px;line-height:1.62;color:var(--muted);white-space:pre-wrap;margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
.brief-meta{font-size:10px;color:var(--faint);margin-top:9px;text-transform:uppercase;letter-spacing:.06em;font-weight:800}
.brief-empty{font-size:12px;color:var(--faint);margin-top:10px;line-height:1.5}

/* ---------- Résumé studio ---------- */
.rs-import{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
.rs-sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--accent3);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.rs-card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.rs-card-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
</style>

</div></div>

      <button class="mini-btn" data-act="sample"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>Load demo data</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

        <h2 class="view-title" id="viewTitle"></h2>

<script>
"use strict";
/* ============================ MODEL ============================ */
const LS_KEY = "pipeline_interview_tracker_v1";

const DEFAULT_STAGES = [
  {id:"wishlist",  name:"Wishlist",        color:"#7c828f", active:true},
  {id:"applied",   name:"Applied",         color:"#5b86b3", active:true},
  {id:"recruiter", name:"Recruiter Screen",color:"#5b9c97", active:true},
  {id:"hm",        name:"Hiring Manager",  color:"#6d72c4", active:true},
  {id:"technical", name:"Technical / Task",color:"#8a72bd", active:true},
  {id:"onsite",    name:"Onsite / Final",  color:"#a874a0", active:true},
  {id:"offer",     name:"Offer",           color:"#4ea381", active:true},
  {id:"rejected",  name:"Rejected",        color:"#c06a6a", active:false},
  {id:"withdrawn", name:"Withdrawn",       color:"#bf8a4f", active:false},
  {id:"ghosted",   name:"Ghosted",         color:"#6b7078", active:false},
];
// Closed/system stages are fixed; the active pipeline stages are user-editable (state.stages)
const CLOSED_STAGES = DEFAULT_STAGES.filter(s=>!s.active);
function activeStages(){ return (state && state.stages && state.stages.length) ? state.stages : DEFAULT_STAGES.filter(s=>s.active); }
function allStages(){ return activeStages().concat(CLOSED_STAGES); }
function stage(id){ return allStages().find(s=>s.id===id) || activeStages()[0] || DEFAULT_STAGES[0]; }

const SOURCES = ["Referral","Recruiter reached out","LinkedIn","Company site","Job board","Cold apply","Networking event","Other"];
const WORKMODES = ["Remote","Hybrid","Onsite"];
const ROUND_TYPES = ["Recruiter screen","Phone / HM","Technical","Take-home","System design","Behavioral","Onsite loop","Panel","Final / Exec","Culture fit","Other"];

let state = load();
let view = "dashboard";
let searchQ = "";
let tableSort = {key:"updatedAt", dir:-1};
let openId = null;
let drawerTab = "overview";
let calMode = "month";  // "month" | "list" | "timeline" — Upcoming view sub-mode
let calCursor = null;   // Date (1st of displayed month); null = current month
let calSel = null;      // "YYYY-MM-DD" selected day in month grid

/* ============================ STORAGE ============================ */
function load(){
  try{ const r = localStorage.getItem(LS_KEY); if(r){ const s=JSON.parse(r); return migrate(s); } }catch(e){}
  return { opportunities:[], meta:{created:Date.now()}, rev:0 };
}
function migrate(s){
  s.opportunities=s.opportunities||[];
  // every record needs a stable id so edit/delete can match it
  s.opportunities.forEach(o=>{
    if(!o.id) o.id=uid();
    (o.rounds||[]).forEach(r=>{ if(!r.id) r.id=uid(); });
    (o.people||[]).forEach(p=>{ if(!p.id) p.id=uid(); });
  });
  // derive a real revision from the newest record so cloud-seed comparisons work
  if(s.rev==null) s.rev = s.opportunities.reduce((m,o)=>Math.max(m,+o.updatedAt||0),0);
  return s;
}
function persist(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ toast("⚠ Couldn't save — storage full?"); } }
// save() = a real user change: bump revision, persist, and push to cloud
function save(){ state.rev = Date.now(); persist(); schedulePush(); if(typeof scheduleRemindersSoon==="function") scheduleRemindersSoon(); }

/* ============================ CLOUD SYNC (Supabase) ============================ */
const SYNC_KEY = "callback_sync_cfg_v1";
let sync = loadSync();
let syncState = "off";           // off | idle | saving | pulling | error
let pushTimer = null, pulling = false;
function loadSync(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; }catch(e){ return {}; } }
function saveSync(){ localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); }
function syncOn(){ return !!(sync.url && sync.key && sync.code); }

function setSyncState(s,msg){ syncState=s; updateSyncUI(msg); }
function updateSyncUI(msg){
  const dot=$("#syncDot"); if(dot){ dot.style.display = syncOn()?"block":"none";
    dot.style.background = syncState==="error"?"var(--bad)":syncState==="saving"||syncState==="pulling"?"var(--warn)":"var(--good)"; }
  const lbl=$("#syncStatusLbl");
  if(lbl){ const map={off:"Not connected",idle:"Synced ✓",saving:"Saving…",pulling:"Checking cloud…",error:"⚠ "+(msg||"Sync error")}; lbl.textContent=map[syncState]||""; lbl.style.color = syncState==="error"?"var(--bad)":syncState==="idle"?"var(--good)":"var(--muted)"; }
}
async function rpc(fn, body){
  const base = sync.url.trim().replace(/\/+$/,"").replace(/\/rest\/v1$/,"");
  const res = await fetch(`${base}/rest/v1/rpc/${fn}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":sync.key, "Authorization":"Bearer "+sync.key },
    body: JSON.stringify(body)
  });
  if(!res.ok){ throw new Error("HTTP "+res.status+" "+(await res.text()).slice(0,120)); }
  const txt = await res.text(); return txt ? JSON.parse(txt) : null;
}
function schedulePush(){ if(!syncOn()) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushNow, 1500); }
async function pushNow(){
  if(!syncOn()) return;
  try{ setSyncState("saving");
    await rpc("set_vault",{ p_code:sync.code, p_data:state, p_updated: state.rev||0 });
    setSyncState("idle");
  }catch(e){ setSyncState("error", e.message); }
}
async function pullNow(opts){
  opts=opts||{};
  if(!syncOn()||pulling) return;
  pulling=true; setSyncState("pulling");
  try{
    const rows = await rpc("get_vault",{ p_code:sync.code });
    const row = Array.isArray(rows)?rows[0]:rows;
    if(row && row.data){
      const remote=row.data, rRev=+row.updated_at||remote.rev||0;
      if(rRev > (state.rev||0)){
        state=remote; persist();
        if(openId && !getOp()) closeDrawer(); else if(openId) renderDrawer();
        render(); if(!opts.silent) toast("Synced latest from cloud");
      } else if((state.rev||0) > rRev){
        await pushNow(); // local is newer — push it up
      }
    } else {
      // nothing in cloud yet — seed it with whatever we have locally
      await pushNow();
    }
    setSyncState("idle");
  }catch(e){ setSyncState("error", e.message); if(!opts.silent) toast("⚠ Sync: "+e.message); }
  pulling=false;
}
function initSync(){
  updateSyncUI();
  if(syncOn()){ setSyncState("idle"); pullNow({silent:true}); }
  window.addEventListener("online", ()=> syncOn() && pullNow({silent:true}));
  window.addEventListener("focus", ()=> syncOn() && pullNow({silent:true}));
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden && syncOn()) pullNow({silent:true}); });
}
function randomCode(){ const w=["amber","brisk","cobalt","delta","ember","fjord","glint","harbor","ivory","jade","koala","lunar","maple","nimbus","onyx","pixel","quartz","raven","slate","tidal","umber","vivid","willow","xenon","yonder","zephyr"]; const p=()=>w[Math.floor(Math.random()*w.length)]; const n=Math.floor(Math.random()*9000+1000); return [p(),p(),p(),n].join("-"); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============================ HELPERS ============================ */
const $ = s => document.querySelector(s);
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }

function fmtDate(d){ if(!d) return ""; const dt=new Date(d+(d.length<=10?"T00:00":"")); if(isNaN(dt)) return ""; return dt.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtDateTime(d,t){ if(!d) return ""; let s=fmtDate(d); if(t){ const [h,m]=t.split(":"); const dt=new Date(); dt.setHours(+h,+m); s+=" · "+dt.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); } return s; }
function daysUntil(d){ if(!d) return null; const dt=new Date(d+(d.length<=10?"T00:00":"")); if(isNaN(dt)) return null; return Math.round((dt - new Date().setHours(0,0,0,0))/86400000); }
function daysSince(ts){ if(!ts) return null; return Math.floor((Date.now()-ts)/86400000); }
function relDays(n){ if(n==null) return ""; if(n===0) return "Today"; if(n===1) return "Tomorrow"; if(n===-1) return "Yesterday"; if(n>1) return "in "+n+"d"; return Math.abs(n)+"d ago"; }

function colorFor(str){ const colors=["#6d72c4","#5b86b3","#8a72bd","#4ea381","#5b9c97","#a874a0","#bf8a4f","#7c828f","#6d8bc4","#52a08f"]; let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h); return colors[Math.abs(h)%colors.length]; }
function initials(s){ return (s||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function favHTML(o,cls){
  const c=colorFor(o.company||"?"); const dom=domainOf(o);
  const fav="https://www.google.com/s2/favicons?sz=128&domain="+encodeURIComponent(dom);
  const primary = o.logo || (dom?"https://logo.clearbit.com/"+encodeURIComponent(dom):"");
  // try the real logo, fall back to the favicon, then to colored initials (the absolute span behind)
  const img = primary
    ? `<img src="${esc(primary)}" loading="lazy" data-fb="${esc(fav)}" onerror="if(this.dataset.tried){this.remove()}else{this.dataset.tried=1;this.src=this.dataset.fb}" alt=""/>`
    : (dom?`<img src="${esc(fav)}" loading="lazy" onerror="this.remove()" alt=""/>`:"");
  return `<div class="fav ${cls||''}" style="background:${c}"><span style="position:absolute">${esc(initials(o.company))}</span>${img}</div>`;
}
function domainOf(o){ if(o.domain) return o.domain.replace(/^https?:\/\//,'').replace(/\/.*$/,''); if(o.jobUrl){ try{ return new URL(o.jobUrl).hostname.replace(/^www\./,''); }catch(e){} } return ""; }
function stars(n){ n=+n||0; return "★".repeat(n)+"☆".repeat(5-n); }

function nextEvent(o){
  // soonest scheduled round, else nextAction
  let best=null;
  (o.rounds||[]).forEach(r=>{ if(r.date && r.status!=="done" && r.status!=="cancelled"){ const du=daysUntil(r.date); if(du!=null && du>=-1){ if(!best||du<best.du) best={du,label:r.name||r.type,date:r.date,time:r.time,link:r.link}; } } });
  if(o.nextActionDate){ const du=daysUntil(o.nextActionDate); if(du!=null && (!best||du<best.du)) best={du,label:o.nextActionLabel||"Next step",date:o.nextActionDate,link:o.nextMeetingLink}; }
  return best;
}
function needsFollowup(o){
  const st=stage(o.status); if(!st.active || o.status==="wishlist" || o.status==="offer") return false;
  const since=daysSince(o.updatedAt);
  const ne=nextEvent(o);
  if(ne && ne.du>=0) return false; // something scheduled ahead
  return since!=null && since>=7;
}

function getProfile(){ state.profile=state.profile||{}; return state.profile; }
function greeting(){ const h=new Date().getHours(); return h<12?"Good morning":h<18?"Good afternoon":"Good evening"; }

  renderNav();

  if(view==="dashboard" && name) $("#viewTitle").innerHTML = `<span class="vt-ico">${v.icon}</span>${greeting()}, ${esc(name.split(" ")[0])}`;
  else $("#viewTitle").innerHTML = `<span class="vt-ico">${v.icon}</span>${esc(v.name)}`;

  if(activeFilter && (view==="cards"||view==="pipeline"))
    $("#viewSub").innerHTML = `Filtered to <b>${esc(activeFilter.label)}</b> · <span data-act="clear-filter" style="cursor:pointer;color:var(--accent2);font-weight:700">clear ✕</span>`;

  if(q){ list=list.filter(o=>{
    const hay=[o.company,o.role,o.location,o.notes,o.product,o.vibes,o.referrer,(o.tags||[]).join(" "),(o.people||[]).map(p=>p.name+" "+p.title).join(" ")].join(" ").toLowerCase();
    return hay.includes(q);

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  const ops=state.opportunities;
  if(!ops.length) return emptyState();
  const active=activeCount();
  const offers=ops.filter(o=>o.status==="offer").length;
  const interviewing=ops.filter(o=>["recruiter","hm","technical","onsite"].includes(o.status)).length;
  const applied=ops.filter(o=>o.status!=="wishlist").length;
  const advanced=ops.filter(o=>["hm","technical","onsite","offer"].includes(o.status)).length;
  const respRate=applied?Math.round(advanced/applied*100):0;
  const followups=ops.filter(needsFollowup);
  const week=ops.map(o=>({o,e:nextEvent(o)})).filter(x=>x.e&&x.e.du>=0&&x.e.du<=7).sort((a,b)=>a.e.du-b.e.du);
  const avgExc=ops.filter(o=>o.excitement).length? (ops.reduce((s,o)=>s+(+o.excitement||0),0)/ops.filter(o=>o.excitement).length).toFixed(1):"—";

  const stat=(num,lbl,icon,cls,tile)=>`<div class="stat ${cls||''}" ${tile?`data-tile="${tile}" role="button" tabindex="0"`:""}><div class="ico">${icon}</div><div class="num">${num}</div><div class="lbl">${lbl}</div>${tile?`<div class="tile-go">→</div>`:""}</div>`;

  let html=dashHero(ops);
  html+=`<div class="grid stat-grid">
    ${stat(interviewing,"Interviewing",I.user,"","interviewing")}
    ${stat(offers,"Offers",I.trophy,"","offers")}
    ${stat(avgExc==="—"?"—":avgExc+"★","Avg fit",I.spark,"")}
    ${stat(respRate+"%","Advance",I.board,"","advance")}
  </div>`;

  // Compare competing offers (only surfaces once ≥2 offers are in play)
  html+=scorecardTeaser();

  // Next moves — the unified, prioritized action hub
  html+=renderMovesHub(ops);

  // Pipeline funnel
  html+=`<div class="section-head"><h3>Pipeline</h3><div class="line"></div><span class="tag">${active} active</span></div>`;
  html+=`<div class="card panel">${funnelChart()}</div>`;

  return html;
}

/* The dashboard hero — the app's visual hook. Adapts to your search:
   1) a LIVE countdown to your next interview, 2) offers on the table, or 3) momentum.
   Aurora is tinted by the next company's color, with a subtle CallBack watermark. */
function heroShell(inner, tint){
  const t = tint ? `<div class="hero-tint" style="background:radial-gradient(52% 62% at 26% 26%, ${tint}5c, transparent 62%)"></div>` : "";
  return `<div class="hero"><div class="hero-aurora"></div>${t}<img src="icon.png" class="hero-mark" alt="" aria-hidden="true"/><div class="hero-grain"></div><div class="hero-inner">${inner}</div></div>`;
}
function heroCountParts(ms){
  if(ms<=0) return {num:"Now",unit:"go time",cls:"now"};
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor(s/60)%60, sec=s%60, pad=n=>String(n).padStart(2,"0");
  return {num:`${h}:${pad(m)}:${pad(sec)}`, unit:"to go", cls:"clock"};
}
let heroTimer=null;
function armHeroCountdown(){
  if(heroTimer){ clearInterval(heroTimer); heroTimer=null; }
  const node=document.getElementById("heroCount"); if(!node) return;
  const deadline=+node.dataset.deadline; if(!deadline) return;
  const tick=()=>{
    const n=document.getElementById("heroCount"); if(!n){ clearInterval(heroTimer); heroTimer=null; return; }
    const left=deadline-Date.now(), p=heroCountParts(left);
    const numEl=n.querySelector(".hc-num"), unitEl=n.querySelector(".hc-unit");
    if(numEl){ numEl.textContent=p.num; numEl.className="hc-num "+(p.cls||""); }
    if(unitEl) unitEl.textContent=p.unit;
    // once it passes, advance the hero to the next event (only if nothing's open)
    if(left<-1000 && view==="dashboard" && !editorEl && !$("#drawer").classList.contains("show")){ clearInterval(heroTimer); heroTimer=null; render(); }
  };
  tick(); heroTimer=setInterval(tick,1000);
}
function dashHero(ops){
  const up = ops.map(o=>({o,e:nextEvent(o)})).filter(x=>x.e&&x.e.du>=0).sort((a,b)=>a.e.du-b.e.du);
  const offers = ops.filter(o=>o.status==="offer");

  if(up.length){
    const {o,e}=up[0];
    const tint=colorFor(o.company);
    const target = e.time ? (()=>{ const d=new Date(e.date+"T"+e.time); return isNaN(d)?null:d.getTime(); })() : null;
    const left = target!=null ? target-Date.now() : null;
    const live = left!=null && left < 24*3600*1000 && left > -60*60*1000;  // tick within the final 24h
    let countInner, countAttr="";
    if(live){ const p=heroCountParts(left); countInner=`<div class="hc-num ${p.cls}">${p.num}</div><div class="hc-unit">${p.unit}</div>`; countAttr=`id="heroCount" data-deadline="${target}"`; }
    else { const num=e.du===0?"Today":e.du===1?"1":String(e.du); const unit=e.du===0?"go time":e.du===1?"day to go":"days to go"; countInner=`<div class="hc-num${e.du===0?" now":""}">${num}</div><div class="hc-unit">${unit}</div>`; }
    const when = fmtDateTime(e.date,e.time)||fmtDate(e.date);
    const inner=`
      <div class="hero-main">
        <div class="hero-eyebrow">${I.clock}<span>Next up</span></div>
        <div class="hero-co">${favHTML(o,"hero-fav")}
          <div style="min-width:0"><div class="hero-name">${esc(o.company)}</div><div class="hero-role">${esc(e.label)}${o.role?` · ${esc(o.role)}`:""}</div></div>
        </div>
        <div class="hero-when">${esc(when)}</div>
        <div class="hero-actions">
          <button class="btn primary sm" data-open="${o.id}">Open role</button>
          <button class="btn ghost sm hero-btn" data-gen-hero="${o.id}">${I.ai} Prep me</button>
          ${e.link?`<a class="btn ghost sm hero-btn" href="${esc(e.link)}" target="_blank" rel="noopener">${I.link} Join</a>`:""}
        </div>
      </div>
      <div class="hero-count" ${countAttr}>${countInner}</div>`;
    return heroShell(inner, tint);
  }

  if(offers.length){
    const multi=offers.length>1;
    const inner=`
      <div class="hero-main">
        <div class="hero-eyebrow">${I.trophy}<span>${multi?"On the table":"You've got an offer"}</span></div>
        <div class="hero-name" style="font-size:22px">${multi?`${offers.length} offers to weigh`:esc(offers[0].company)}</div>
        <div class="hero-role">${multi?"Score them side by side and decide with confidence.":`${esc(offers[0].role||"Offer")} — make the call.`}</div>
        <div class="hero-actions">
          ${multi?`<button class="btn primary sm" data-act="open-scorecard">${I.trophy} Compare offers</button>`:`<button class="btn primary sm" data-open="${offers[0].id}">Open offer</button>`}
        </div>
      </div>
      <div class="hero-count"><div class="hc-num">${offers.length}</div><div class="hc-unit">${multi?"offers":"offer"}</div></div>`;
    return heroShell(inner, "#4ea381");
  }

  // momentum: active roles but nothing scheduled — a prompt, not another count
  const active=ops.filter(o=>stage(o.status).active && o.status!=="wishlist").length;
  const nudges=ops.filter(needsFollowup).length;
  const head = nudges ? `${nudges} ${nudges===1?"role needs":"roles need"} a nudge`
            : active ? "Nothing scheduled"
            : "Let's line up your first interview";
  const sub = nudges ? "A quick follow-up keeps them warm and top of mind."
            : active ? "Add an interview or paste a job link to keep the momentum going."
            : "Paste a job posting, recruiter email or invite — I'll set up the rest.";
  const inner=`
    <div class="hero-main hero-prompt">
      <div class="hero-eyebrow">${I.spark}<span>Your search</span></div>
      <div class="hero-name" style="font-size:23px">${head}</div>
      <div class="hero-role" style="max-width:48ch;white-space:normal">${sub}</div>
      <div class="hero-actions">
        <button class="btn primary sm" data-act="smart-paste">${I.ai} Smart add</button>
        ${nudges?`<button class="btn ghost sm hero-btn" data-tile="nudge">Review follow-ups</button>`:`<button class="btn ghost sm hero-btn" data-act="add">＋ Add role</button>`}
      </div>
    </div>`;
  return heroShell(inner);
}

/* ---- Next moves: one prioritized action queue across every role ---- */
function nextMoves(ops){
  const moves=[];
  ops.forEach(o=>{
    const st=stage(o.status);
    if(!st.active && o.status!=="offer") return; // skip closed/rejected
    (o.rounds||[]).forEach(r=>{
      if(r.date && r.status!=="done" && r.status!=="cancelled"){ const du=daysUntil(r.date); if(du!=null && du>=0 && du<=14) moves.push({o,type:"interview",rid:r.id,label:r.name||r.type||"Interview",du,date:r.date,time:r.time}); }
      if(r.status==="done" && r.date && !r.thanked){ const du=daysUntil(r.date); if(du!=null && du<=0 && du>=-2) moves.push({o,type:"thanks",rid:r.id,label:`Thank-you · ${r.name||r.type||"interview"}`,du:0.4,date:r.date}); }
    });
    if(o.nextActionDate){ const du=daysUntil(o.nextActionDate); if(du!=null && du<=14) moves.push({o,type:"task",label:o.nextActionLabel||"Next step",du,date:o.nextActionDate}); }
    if(o.offer&&o.offer.deadline){ const du=daysUntil(o.offer.deadline); if(du!=null && du<=21) moves.push({o,type:"offer",label:"Decide on offer",du,date:o.offer.deadline}); }
    if(needsFollowup(o)) moves.push({o,type:"followup",label:"Follow up — gone quiet",du:9000,quiet:daysSince(o.updatedAt)});
  });
  return moves.sort((a,b)=>a.du-b.du);
}
const MOVE_META={
  interview:{ico:()=>I.cal,col:"var(--accent3)"},
  thanks:{ico:()=>I.ai,col:"var(--good)"},
  task:{ico:()=>I.check,col:"var(--accent2)"},
  offer:{ico:()=>I.trophy,col:"var(--warn)"},
  followup:{ico:()=>I.bell,col:"var(--hot)"},
};
function moveActions(m){
  const o=m.o;
  if(m.type==="interview") return `<button class="btn sm ghost" data-gen-hero="${o.id}">${I.ai} Prep</button>`;
  if(m.type==="thanks") return `<button class="btn sm ghost" data-gen-ty="${m.rid}">${I.ai} Write</button><button class="btn sm ghost" data-thanked="${m.rid}" title="Mark sent">✓</button>`;
  if(m.type==="task") return `<button class="btn sm ghost" data-task-done="${o.id}">✓ Done</button>`;
  if(m.type==="offer") return state.opportunities.filter(x=>x.status==="offer").length>1?`<button class="btn sm ghost" data-act="open-scorecard">Compare</button>`:"";
  if(m.type==="followup") return `<button class="btn sm ghost" data-followup="${o.id}">${I.ai} Draft</button>`;
  return "";
}
function renderMovesHub(ops){
  const moves=nextMoves(ops);
  if(!moves.length) return `<div class="section-head"><h3>Next moves</h3><div class="line"></div></div>
    <div class="card panel" style="text-align:center;color:var(--faint);font-size:13px;padding:24px">🎉 You're all caught up — nothing needs you right now.</div>`;
  let h=`<div class="section-head"><h3>Next moves</h3><div class="line"></div><span class="tag">${moves.length}</span></div><div class="card panel" style="padding:5px">`;
  h+=moves.map(m=>{
    const md=MOVE_META[m.type]||MOVE_META.task;
    const overdue = m.du<0;
    const due = m.type==="followup" ? `${m.quiet}d quiet`
             : m.type==="thanks" ? "Send today"
             : overdue ? `${Math.abs(Math.round(m.du))}d ago`
             : m.du===0 ? "Today" : relDays(m.du);
    const dueCol = overdue?'var(--bad)':m.du===0?'var(--warn)':m.type==="followup"?'var(--hot)':'var(--accent2)';
    return `<div class="move" data-open="${m.o.id}">
      <div class="move-ico" style="color:${md.col};background:${md.col}1f">${md.ico()}</div>
      ${favHTML(m.o,'move-fav')}
      <div class="move-body"><div class="move-label">${esc(m.label)}</div><div class="move-co">${esc(m.o.company)}${m.o.role?` · ${esc(m.o.role)}`:""}</div></div>
      <span class="move-due" style="color:${dueCol}">${due}</span>
      <div class="move-actions">${moveActions(m)}</div>
    </div>`;
  }).join("");
  return h+`</div>`;
}

function renderPipeline(){

  const wrap=el(`<div class="board scroll"></div>`);
  const list=filtered();
  activeStages().forEach(s=>{
    const items=list.filter(o=>o.status===s.id);
    const col=el(`<div class="col" data-stage="${s.id}">
      <div class="col-head"><span class="dot" style="background:${s.color}"></span><span class="nm">${esc(s.name)}</span><span class="ct">${items.length}</span></div>
      <div class="col-body scroll"></div></div>`);
    const body=col.querySelector(".col-body");
    items.sort((a,b)=>{ const ea=nextEvent(a),eb=nextEvent(b); if(ea&&eb) return ea.du-eb.du; if(ea)return -1; if(eb)return 1; return (b.excitement||0)-(a.excitement||0); });
    items.forEach(o=> body.appendChild(kcardEl(o)));
    wrap.appendChild(col);
  });
  // closed column (collapsed list)
  const closed=list.filter(o=>!stage(o.status).active);
  if(closed.length){

    const body=col.querySelector(".col-body");
    closed.forEach(o=> body.appendChild(kcardEl(o)));
    wrap.appendChild(col);
  }
  root.appendChild(wrap);
  return root;
}
function kcard(o){ return kcardEl(o).outerHTML; }

function isMobile(){ return window.matchMedia("(max-width:860px)").matches; }
function sortRoles(list){
  const {key,dir}=tableSort;
  return list.sort((a,b)=>{
    let va,vb;
    if(key==="stage"){ va=allStages().findIndex(s=>s.id===a.status); vb=allStages().findIndex(s=>s.id===b.status); }
    else if(key==="next"){ va=(nextEvent(a)||{du:99999}).du; vb=(nextEvent(b)||{du:99999}).du; }
    else if(key==="excitement"){ va=+a.excitement||0; vb=+b.excitement||0; }
    else { va=(a[key]||"").toString().toLowerCase(); vb=(b[key]||"").toString().toLowerCase(); }
    if(va<vb) return -dir; if(va>vb) return dir; return 0;
  });
}
function compRange(o){ if(!o.compMin&&!o.compMax) return ""; if(o.compMin&&o.compMax) return fmtMoney(o.compMin)+"–"+fmtMoney(o.compMax); return fmtMoney(o.compMin||o.compMax); }

        <div style="color:var(--muted);font-size:12.5px;margin-top:3px">${esc(e.o.company)} ${e.time?"· "+fmtDateTime(e.date,e.time).split("· ")[1]:""} ${e.link?`· <a href="${esc(e.link)}" target="_blank" rel="noopener">join</a>`:""} ${e.rid&&d>=0?`· <span data-ics="${e.rid}" style="color:var(--accent2);cursor:pointer;font-weight:700">+ calendar</span>`:""}</div>
      </div>
      <span class="chip" style="color:${d<0?'var(--faint)':d<=2?'var(--warn)':'var(--accent2)'}">${d===0?"Today":relDays(d)}</span>
    </div>`;
  };
  let html=calToggle();
  html+=`<div class="section-head"><h3>Upcoming</h3><div class="line"></div><span class="tag">${upcoming.length}</span></div>`;
  html+= upcoming.length? upcoming.map(row).join("") : `<div style="color:var(--faint);font-size:13px;padding:6px 4px">Nothing scheduled ahead.</div>`;

  return html;
}

/* ---------------- MONTH GRID ---------------- */
function ymd(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function todayYMD(){ const n=new Date(); return ymd(n.getFullYear(),n.getMonth(),n.getDate()); }
const chevL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m15 18-6-6 6-6"/></svg>';
const chevR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>';
function renderMonth(){
  const events=calEvents();
  const byDay={}; events.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  const cur = calCursor || (()=>{ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1); })();
  const y=cur.getFullYear(), m=cur.getMonth();
  const startDow=new Date(y,m,1).getDay(), daysIn=new Date(y,m+1,0).getDate();
  const tStr=todayYMD();

  const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-dow">${d}</div>`).join("");
  const totalCells=Math.ceil((startDow+daysIn)/7)*7;
  let cells="";
  for(let i=0;i<totalCells;i++){
    const dn=i-startDow+1;
    if(dn<1||dn>daysIn){ cells+=`<div class="cal-cell empty"></div>`; continue; }
    const ds=ymd(y,m,dn), list=(byDay[ds]||[]);
    const chips=list.slice(0,3).map(e=>{ const c=stage(e.o.status).color; return `<div class="cal-ev" style="background:${c}22;color:${c}" title="${esc(e.o.company)} · ${esc(e.label)}">${esc(e.o.company)}</div>`; }).join("");
    const more=list.length>3?`<div class="cal-more">+${list.length-3} more</div>`:"";
    const dots=list.slice(0,5).map(e=>`<span class="cal-dot" style="background:${stage(e.o.status).color}"></span>`).join("");
    cells+=`<div class="cal-cell${ds===tStr?' today':''}${ds===calSel?' sel':''}${list.length?' has':''}" data-calday="${ds}">
      <div class="cal-dnum">${dn}</div>
      <div class="cal-evs">${chips}${more}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  const header=`<div class="cal-head">
    <button class="cal-nav" data-calnav="-1" title="Previous month">${chevL}</button>
    <div class="cal-title">${cur.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div>
    <button class="cal-nav" data-calnav="1" title="Next month">${chevR}</button>
    <button class="btn ghost sm" data-calnav="0" style="margin-left:6px">Today</button>
  </div>`;

  // detail panel for the selected day (or today)
  const dDate = calSel || tStr;
  const dList = (byDay[dDate]||[]).slice().sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
  const longDate = new Date(dDate+'T00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  let detail="";
  if(dList.length){
    detail=`<div class="cal-detail"><div class="cal-detail-h">${longDate}</div>`+dList.map(e=>{
      const d=daysUntil(e.date), c=stage(e.o.status).color;
      return `<div class="sub-item" data-open="${e.o.id}" style="cursor:pointer;display:flex;align-items:center;gap:11px">
        <span class="pill" style="background:${c}22;color:${c}"><span class="dot" style="background:${c}"></span>${e.type}</span>
        <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:13.5px">${esc(e.label)}</div>
          <div style="color:var(--muted);font-size:12px;margin-top:2px">${esc(e.o.company)}${e.time?" · "+fmtDateTime(e.date,e.time).split("· ")[1]:""}${e.link?` · <a href="${esc(e.link)}" target="_blank" rel="noopener">join</a>`:""}${e.rid&&d>=0?` · <span data-ics="${e.rid}" style="color:var(--accent2);cursor:pointer;font-weight:700">+ calendar</span>`:""}</div>

  }

  return `<div class="calendar">${header}<div class="cal-grid">${dow}${cells}</div>${detail}</div>`;
}

/* ---------------- TIMELINE (per-job swimlanes) ---------------- */
function tlMs(d){ if(!d) return null; const t=new Date(d.length<=10? d+'T00:00': d).getTime(); return isNaN(t)?null:t; }
function tlNodes(o){
  const ns=[];
  if(o.appliedDate){ const t=tlMs(o.appliedDate); if(t!=null) ns.push({t,kind:'applied',label:'Applied',date:o.appliedDate}); }
  (o.rounds||[]).forEach(r=>{ const t=tlMs(r.date); if(t!=null) ns.push({t,kind:'round',status:r.status||'',label:r.name||r.type||'Round',date:r.date,rid:r.id}); });
  if(o.offer&&o.offer.deadline){ const t=tlMs(o.offer.deadline); if(t!=null) ns.push({t,kind:'offer',label:'Offer decision',date:o.offer.deadline}); }
  if(o.nextActionDate){ const t=tlMs(o.nextActionDate); if(t!=null) ns.push({t,kind:'task',label:o.nextActionLabel||'Next step',date:o.nextActionDate}); }
  ns.sort((a,b)=>a.t-b.t);
  return ns;
}
function renderTimeline(){
  const rows=state.opportunities.map(o=>({o,ns:tlNodes(o)})).filter(x=>x.ns.length);
  if(!rows.length) return `<div class="empty"><div class="big">${I.cal}</div><h3>Nothing to chart yet</h3><p>Add an applied date or interview rounds to your roles and they'll appear as timelines here.</p></div>`;
  rows.sort((a,b)=> a.ns[0].t - b.ns[0].t);

  const today=new Date().setHours(0,0,0,0);
  let min=Infinity, max=-Infinity;
  rows.forEach(x=>x.ns.forEach(n=>{ if(n.t<min)min=n.t; if(n.t>max)max=n.t; }));
  min=Math.min(min,today); max=Math.max(max,today);
  if(min===max){ min-=7*864e5; max+=7*864e5; }
  const PAD=3, span=max-min;
  const X=t=> PAD + (t-min)/span*(100-2*PAD);
  const todayX=X(today);

  const n=rows.length;
  rows.forEach((row,i)=> row.color=`hsl(${Math.round(i*360/n)},42%,62%)`);  // unique but desaturated hue per job

  // month axis ticks
  let ticks="", cur=new Date(new Date(min).getFullYear(), new Date(min).getMonth(), 1);
  if(cur.getTime()<min) cur=new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  while(cur.getTime()<=max){
    ticks+=`<div class="tl-tick" style="left:${X(cur.getTime())}%"><span>${cur.toLocaleDateString(undefined,{month:'short'})}${cur.getMonth()===0?" '"+String(cur.getFullYear()).slice(2):""}</span></div>`;
    cur=new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const rowHTML=rows.map(row=>{
    const o=row.o, c=row.color, st=stage(o.status), closed=!st.active;
    const x1=X(row.ns[0].t), x2=X(row.ns[row.ns.length-1].t), solidEnd=Math.min(x2,todayX);
    let lines="";
    if(solidEnd>x1) lines+=`<div class="tl-line" style="left:${x1}%;width:${solidEnd-x1}%;background:${c}"></div>`;
    if(x2>todayX){ const ds=Math.max(x1,todayX); lines+=`<div class="tl-line dashed" style="left:${ds}%;width:${x2-ds}%;border-top:2px dashed ${c}"></div>`; }
    const dots=row.ns.map(nd=>{
      const px=X(nd.t), future=nd.t>today;
      let cls="tl-dot";
      if(nd.kind==='offer') cls+=" offer";
      else if(nd.kind==='task') cls+=" task";
      else if(nd.kind==='applied') cls+=" applied";
      else cls += nd.status==='done'?" done" : nd.status==='cancelled'?" cancelled" : future?" upcoming":" pending";
      return `<span class="${cls}" style="left:${px}%;--c:${c}" data-open="${o.id}" title="${esc(nd.label)} · ${esc(fmtDate(nd.date))}">${nd.kind==='offer'?'◆':''}</span>`
        + `<span class="tl-lbl" style="left:${px}%">${esc(nd.label)}</span>`;
    }).join("");
    return `<div class="tl-row${closed?' closed':''}">
      <div class="tl-head">
        <span class="tl-swatch" style="background:${c}"></span>
        <span class="tl-co" data-open="${o.id}">${esc(o.company)}</span>
        ${o.role?`<span class="tl-role">${esc(o.role)}</span>`:""}
        <span class="pill" style="margin-left:auto;background:${st.color}22;color:${st.color}"><span class="dot" style="background:${st.color}"></span>${esc(st.name)}</span>
      </div>
      <div class="tl-track">${lines}${dots}</div>
    </div>`;
  }).join("");

  const legend=`<div class="tl-legend">
    <span><i class="lg done"></i>done</span>
    <span><i class="lg upcoming"></i>upcoming</span>
    <span><i class="lg applied"></i>applied</span>
    <span><i class="lg cancelled"></i>cancelled</span>
    <span><i class="lg offer">◆</i>offer</span>
    <span class="tl-nowkey">today</span>
  </div>`;

  return `<div class="timeline">${legend}
    <div class="tl-axis">${ticks}</div>
    <div class="tl-body"><div class="tl-now" style="left:${todayX}%"></div>${rowHTML}</div>
  </div>`;
}

/* ---- Ask AI: a pipeline-aware assistant, surfaced app-wide ---- */
function pipelineContext(){
  const ops=state.opportunities;
  const act=ops.filter(o=>stage(o.status).active && o.status!=="wishlist");
  const L=[`Today is ${todayYMD()}. I'm tracking ${ops.length} processes — ${act.length} active.`,""];
  if(act.length){
    L.push("ACTIVE PROCESSES:");
    act.slice().sort((a,b)=>{const ea=nextEvent(a),eb=nextEvent(b);return (ea?ea.du:9999)-(eb?eb.du:9999);}).forEach(o=>{
      const e=nextEvent(o);
      L.push(`- ${o.company}${o.role?` (${o.role})`:""} | stage: ${stage(o.status).name}`+
        (e?` | next: ${e.label} ${fmtDate(e.date)} (${relDays(e.du)})`:` | nothing scheduled, ${daysSince(o.updatedAt)||0}d quiet`)+
        (compRange(o)?` | comp ${compRange(o)}`:"")+(o.excitement?` | fit ${o.excitement}/5`:"")+(o.source?` | via ${o.source}`:""));
      if((o.people||[]).length) L.push(`    contacts: ${o.people.map(p=>p.name+(p.title?` (${p.title})`:"")).join(", ")}`);
    });
  }
  const offers=ops.filter(o=>o.status==="offer");
  if(offers.length){ L.push("","OFFERS:"); offers.forEach(o=>{ const f=o.offer||{}; L.push(`- ${o.company}${o.role?` (${o.role})`:""}: ${[f.base&&("base "+f.base),f.bonus&&("bonus "+f.bonus),f.equity&&("equity "+f.equity)].filter(Boolean).join(", ")||compRange(o)||"details TBD"}${f.deadline?` | decide by ${fmtDate(f.deadline)}`:""}`); }); }
  return L.join("\n");
}

function fmtMoney(n){ n=+n; if(!n) return ""; return n>=1000? "$"+Math.round(n/1000)+"k" : "$"+n; }

/* ---------------- CHARTS ---------------- */
function funnelChart(){
  const max=Math.max(1,...activeStages().map(s=>state.opportunities.filter(o=>o.status===s.id).length));
  return activeStages().map(s=>{
    const n=state.opportunities.filter(o=>o.status===s.id).length;
    return `<div class="bar-row" style="cursor:default"><div class="nm">${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${n?Math.max(n/max*100,8):0}%;background:${s.color}">${n||""}</div></div></div>`;
  }).join("");
}
function donut(data){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let a=-90, cx=70,cy=70,r=54,sw=24;
  const segs=data.map((d,i)=>{
    const frac=d.value/total; const len=frac*360; const col=colorFor(d.label+i);
    const large=len>180?1:0;
    const a2=a+len;
    const x1=cx+r*Math.cos(a*Math.PI/180), y1=cy+r*Math.sin(a*Math.PI/180);
    const x2=cx+r*Math.cos(a2*Math.PI/180), y2=cy+r*Math.sin(a2*Math.PI/180);
    a=a2;
    return `<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${sw}"/>`;
  }).join("");
  const legend=data.sort((a,b)=>b.value-a.value).map((d,i)=>`<div class="legend-row"><span class="dot" style="background:${colorFor(d.label+data.indexOf(d))}"></span><span>${esc(d.label)}</span><span class="v">${d.value}</span></div>`).join("");
  return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg viewBox="0 0 140 140" width="140" height="140" style="flex:0 0 140px">${segs}<text x="70" y="66" text-anchor="middle" fill="#e7ecf6" font-size="26" font-weight="800">${total}</text><text x="70" y="84" text-anchor="middle" fill="#6b7795" font-size="11" font-weight="700">total</text></svg><div class="legend" style="flex:1;min-width:140px">${legend}</div></div>`;
}

/* ============================ OFFER SCORECARD ============================ */
// A weighted decision matrix across competing offers. Criteria + weights are global
// (state.scorecard.criteria); per-offer ratings live in state.scorecard.scores[opId][critId].
// Lazily initialised so it only persists once the user actually touches it.
function defaultCriteria(){ return [
  {id:"c_comp",    name:"Compensation",      weight:25},
  {id:"c_growth",  name:"Role & growth",     weight:20},
  {id:"c_team",    name:"Team & manager",    weight:15},
  {id:"c_culture", name:"Culture & values",  weight:15},
  {id:"c_wlb",     name:"Work–life balance", weight:15},
  {id:"c_mission", name:"Mission & product", weight:10},
]; }
function getScorecard(){
  if(!state.scorecard || typeof state.scorecard!=="object") state.scorecard={};
  if(!Array.isArray(state.scorecard.criteria) || !state.scorecard.criteria.length) state.scorecard.criteria=defaultCriteria();
  if(!state.scorecard.scores || typeof state.scorecard.scores!=="object") state.scorecard.scores={};
  return state.scorecard;
}
function scOffers(){ return state.opportunities.filter(o=>o.status==="offer"); }
function scScore(opId, critId){ return ((getScorecard().scores[opId])||{})[critId]||0; }
function scSet(opId, critId, v){ const sc=getScorecard(); (sc.scores[opId]=sc.scores[opId]||{})[critId]=v; }
// weighted average on a 1-5 scale across the criteria that have actually been rated
function scResult(o){
  const sc=getScorecard(); let wsum=0, sum=0, rated=0;
  sc.criteria.forEach(c=>{ const r=scScore(o.id,c.id), w=Math.max(0,+c.weight||0); if(r>0){ wsum+=w; sum+=w*r; rated++; } });
  return { avg: wsum? sum/wsum : 0, rated, total: sc.criteria.length };
}

// Gradient call-to-action shown on Dashboard & Insights once ≥2 offers are in play.
function scorecardTeaser(){
  const offers=scOffers(); if(offers.length<2) return "";
  const top=offers.map(o=>({o,r:scResult(o)})).sort((a,b)=>b.r.avg-a.r.avg)[0];
  const lead = top.r.avg ? `<b style="color:var(--accent3)">${esc(top.o.company)}</b> is ahead at ${top.r.avg.toFixed(1)}/5` : `Score them on what actually matters to you`;
  return `<div class="ai-box" data-act="open-scorecard" role="button" tabindex="0" style="cursor:pointer">
    <div class="ai-head">${I.trophy} ${offers.length} offers on the table — compare them side by side</div>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">A weighted decision matrix scores every offer on the things you care about, so the right call gets obvious. ${lead}.</div>
    <button class="btn primary sm" data-act="open-scorecard">${I.spark} Open offer scorecard</button>
  </div>`;
}
