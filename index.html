function scResultsInner(ranked){
  return ranked.map((x,i)=>{
    const win = i===0 && x.r.avg>0;
    const w = x.r.avg? Math.max(x.r.avg/5*100,6) : 0;
    return `<div class="bar-row"><div class="nm">${win?"🏆 ":""}${esc(x.o.company)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${win?'var(--grad)':'var(--accent)'}">${x.r.avg?x.r.avg.toFixed(1):""}</div></div>
      <div style="width:66px;font-size:11.5px;color:var(--faint);text-align:right">${x.r.rated?x.r.rated+"/"+x.r.total+" scored":"unscored"}</div></div>`;
  }).join("");
}
function scorecardBody(){
  const sc=getScorecard(), offers=scOffers();
  const totW=sc.criteria.reduce((s,c)=>s+Math.max(0,+c.weight||0),0)||1;

  let h=`<div style="display:flex;align-items:center;gap:11px;margin-bottom:6px">
    <div style="width:36px;height:36px;border-radius:11px;background:var(--grad);display:grid;place-items:center">${I.trophy}</div>
    <div><h2 style="margin:0;font-size:18px;font-weight:850">Offer scorecard</h2><div style="font-size:12.5px;color:var(--faint)">Weighted decision matrix</div></div>
    <button class="x-btn" data-act="cancel-editor" style="margin-left:auto">${I.x}</button>
  </div>`;

  if(!offers.length){
    h+=`<div class="note-block" style="margin-top:14px">No offers to compare yet. When a role moves to the <b>Offer</b> stage it shows up here automatically. You can still tune your criteria &amp; weights below so you're ready.</div>`;
  } else {
    const ranked=offers.map(o=>({o,r:scResult(o)})).sort((a,b)=>b.r.avg-a.r.avg);
    h+=`<div class="section-head"><h3>The verdict</h3><div class="line"></div></div>`;
    h+=`<div class="card panel" id="scResults">`+scResultsInner(ranked)+`</div>`;
  }

  // criteria + weights
  h+=`<div class="section-head"><h3>What matters to you</h3><div class="line"></div></div>`;
  h+=`<div class="card panel"><div style="font-size:12px;color:var(--faint);margin-bottom:12px">How much each factor weighs in your decision. Weights are relative — they don't need to add up to 100.</div>`;
  h+=sc.criteria.map(c=>{
    const pct=Math.round(Math.max(0,+c.weight||0)/totW*100);
    return `<div class="sub-item" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:9px">
      <input value="${esc(c.name)}" data-sc-critname="${c.id}" maxlength="28" style="flex:1"/>
      <input type="number" min="0" max="100" value="${esc(c.weight)}" data-sc-weight="${c.id}" style="width:60px;text-align:center" title="Weight"/>
      <span style="font-size:11px;color:var(--faint);width:32px;text-align:right" data-sc-pct="${c.id}">${pct}%</span>
      <button class="x-btn danger" data-sc-delcrit="${c.id}" ${sc.criteria.length<=1?'style="opacity:.3;pointer-events:none"':''} title="Remove">${I.trash}</button>
    </div>`;
  }).join("");
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <button class="btn ghost sm" data-act="sc-addcrit">+ Add factor</button>
    <button class="btn ghost sm" data-act="sc-reset">↻ Reset to defaults</button>
  </div></div>`;

  // per-offer scoring (vertical cards — no horizontal scroll on mobile)
  if(offers.length){
    h+=`<div class="section-head"><h3>Score each offer</h3><div class="line"></div></div>`;
    h+=offers.map(o=>{
      const r=scResult(o);
      const comp = (o.offer&&o.offer.base)? esc(o.offer.base)
        : (o.compMin||o.compMax)? (fmtMoney(o.compMin||o.compMax)+((o.compMin&&o.compMax&&o.compMin!=o.compMax)?"–"+fmtMoney(o.compMax):"")) : "";
      return `<div class="card panel" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          ${favHTML(o)}
          <div style="min-width:0"><div style="font-weight:800">${esc(o.company)}</div><div style="font-size:12px;color:var(--muted)">${esc(o.role||"")}${comp?` · ${comp}`:""}</div></div>
          <span class="chip tag-chip" style="margin-left:auto">${r.avg?r.avg.toFixed(1)+" /5":"—"}</span>
        </div>`+
        sc.criteria.map(c=>{
          const v=scScore(o.id,c.id);
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
            <div style="flex:1;font-size:12.5px;color:var(--muted)">${esc(c.name)}</div>
            <div class="rating-pick">${[1,2,3,4,5].map(n=>`<span class="s ${v>=n?'on':''}" data-sc-rate="${o.id}|${c.id}|${n}">★</span>`).join("")}</div>
          </div>`;
        }).join("")
      +`</div>`;
    }).join("");

    h+=`<button class="btn primary" style="width:100%;margin-top:2px" data-act="sc-copy">${I.ai} Copy AI decision brief</button>
    <div style="font-size:11.5px;color:var(--faint);margin-top:8px;text-align:center">Paste into any AI to pressure-test your scores and get a recommendation.</div>`;
  }
  return h;
}

function scorecardPrompt(){
  const sc=getScorecard(), offers=scOffers();
  const totW=sc.criteria.reduce((s,c)=>s+Math.max(0,+c.weight||0),0)||1;
  const L=[];
  L.push(`I'm choosing between ${offers.length} job offer${offers.length>1?"s":""}. Below is my weighted decision scorecard — my priorities (with weights) and how I've rated each offer 1–5 on every factor. Please pressure-test my scoring, flag blind spots or things I should ask about, weigh the trade-offs, and give me a clear recommendation with your reasoning.`);
  L.push("");
  L.push(`## My priorities (weight = how much it matters)`);
  sc.criteria.forEach(c=>L.push(`- ${c.name}: ${Math.round(Math.max(0,+c.weight||0)/totW*100)}%`));
  L.push("");
  offers.map(o=>({o,r:scResult(o)})).sort((a,b)=>b.r.avg-a.r.avg).forEach(({o,r})=>{
    L.push(`## ${o.company}${o.role?" — "+o.role:""}  (my weighted score: ${r.avg?r.avg.toFixed(1)+"/5":"unscored"})`);
    sc.criteria.forEach(c=>{ const v=scScore(o.id,c.id); L.push(`- ${c.name}: ${v?v+"/5":"—"}`); });
    const det=[];
    if(o.offer&&o.offer.base) det.push(`base ${o.offer.base}`);
    if(o.offer&&o.offer.bonus) det.push(`bonus ${o.offer.bonus}`);
    if(o.offer&&o.offer.equity) det.push(`equity ${o.offer.equity}`);
    if(!det.length && (o.compMin||o.compMax)) det.push(`comp ${[o.compMin,o.compMax].filter(Boolean).join("–")}`);
    if(o.location) det.push(o.location);
    if(o.workMode) det.push(o.workMode);
    if(det.length) L.push(`- Details: ${det.join(", ")}`);
    if(o.offer&&o.offer.deadline) L.push(`- Decision deadline: ${fmtDate(o.offer.deadline)}`);
    if(o.offer&&o.offer.notes) L.push(`- Offer notes: ${o.offer.notes}`);
    if(o.vibes) L.push(`- My read on them: ${o.vibes}`);
    L.push("");
  });
  L.push(`Which would you choose, and what am I underweighting or missing?`);
  return L.join("\n");
}

function buildBrief(o){
  const L=[];
  L.push(`# Interview brief — ${o.company}${o.role?` (${o.role})`:""}`);
  L.push("");
  if(getProfile().name) L.push(`- Candidate (me): ${getProfile().name}${getProfile().headline?` — ${getProfile().headline}`:""}`);
  L.push(`- Stage: ${stage(o.status).name}`);
  if(o.source) L.push(`- How I got here: ${o.source}${o.referrer?` (via ${o.referrer})`:""}`);
  if(o.workMode||o.location) L.push(`- Setup: ${[o.workMode,o.location].filter(Boolean).join(", ")}`);
  if(o.compMin||o.compMax) L.push(`- Comp target: ${(o.compMin?fmtMoney(o.compMin):"")}${o.compMax?"–"+fmtMoney(o.compMax):""}${o.compNotes?` (${o.compNotes})`:""}`);
  if(o.excitement) L.push(`- My excitement: ${o.excitement}/5`);
  const e=nextEvent(o); if(e) L.push(`- Next: ${e.label} on ${fmtDateTime(e.date,e.time)||fmtDate(e.date)}`);
  if(o.jobUrl) L.push(`- Job post: ${o.jobUrl}`);
  if((o.tags||[]).length) L.push(`- Tags: ${o.tags.join(", ")}`);
  if(o.product){ L.push(""); L.push(`## Company / product`); L.push(o.product); }

let editorEl=null;
function openEditor(html){
  closeEditor();
  // Flex + margin:auto so the modal centers when it fits but, when it's taller than
  // the (dynamic, toolbar-aware) viewport, the overlay itself scrolls — keeping the top
  // (the X button) and bottom reachable instead of clipped off-screen on mobile.
  editorEl=el(`<div class="overlay show" id="editorOverlay" style="z-index:150;display:flex;justify-content:center;overflow:auto;-webkit-overflow-scrolling:touch;padding:max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left))">
    <div class="card" style="width:min(540px,100%);margin:auto;padding:22px">${html}</div></div>`);
  document.body.appendChild(editorEl);
  editorEl.addEventListener("click",e=>{ if(e.target===editorEl) closeEditor(); }); // only background closes
  const f=editorEl.querySelector("input,textarea,select"); if(f) setTimeout(()=>f.focus(),50);
}
function closeEditor(){ if(editorEl){ editorEl.remove(); editorEl=null; } }

);

/* ============================ SMART PASTE (AI ingest) ============================ */
// Paste a calendar invite / recruiter email / job post / LinkedIn profile → a suggested entry.
// Engine is pluggable: Supabase proxy (key server-side) → direct provider key (browser) →
// copy-paste fallback (any chatbot, no key). Config is device-local, never synced, never in repo.
const AI_KEY="callback_ai_cfg_v1";
let aiCfg=(function(){ try{ return JSON.parse(localStorage.getItem(AI_KEY))||{}; }catch(e){ return {}; } })();
function saveAICfg(){ try{ localStorage.setItem(AI_KEY, JSON.stringify(aiCfg)); }catch(e){} }
function aiProxyUrl(){ if(aiCfg.proxyUrl) return aiCfg.proxyUrl.trim();
  if(sync.url) return sync.url.trim().replace(/\/+$/,"").replace(/\/rest\/v1$/,"")+"/functions/v1/ai"; return ""; }
// effective engine after checking requirements; falls back to copy-paste
function aiEngine(){
  const e=aiCfg.engine||"google";   // Gemini is the default — free tier, broad reach
  if(e==="off") return "off";
  if(e==="proxy") return aiProxyUrl()?"proxy":"paste";
  if(e==="anthropic") return aiCfg.key?"anthropic":"paste";
  if(e==="openai") return aiCfg.key?"openai":"paste";
  if(e==="google") return aiCfg.key?"google":"paste";
  return "paste";
}
// providers that can read an uploaded PDF directly
function engineReadsPDF(){ return ["proxy","anthropic","google"].includes(aiEngine()); }
const AI_SCHEMA=`Return ONLY a JSON object (no markdown, no commentary) with exactly these keys:
{
 "company": "",            // employer name; "" if unknown
 "role": "",               // job title; "" if unknown
 "kind": "interview",      // one of: interview, task, offer, contact, application, other
 "round": null,            // or { "name":"", "type":"", "date":"YYYY-MM-DD", "time":"HH:MM", "interviewers":"", "link":"" }
 "person": null,           // or { "name":"", "title":"", "linkedin":"", "email":"", "notes":"" }
 "source": "",             // how it came about (recruiter, referral, job board…)
 "location": "",
 "workMode": "",           // Remote, Hybrid, or Onsite
 "compNote": "",           // any pay info mentioned
 "nextActionLabel": "",    // a suggested next step
 "nextActionDate": "",     // YYYY-MM-DD
 "notes": ""               // 1–3 sentences of anything else useful
}`;
function aiPrompt(text){
  return `You extract structured job-search data. Today is ${todayYMD()}. The pasted content below may be a calendar invite, a recruiter or interview email, a job posting, or a LinkedIn / contact profile. Pull the details into the exact JSON schema. Resolve relative dates (e.g. "next Tuesday", "tomorrow 3pm") to absolute YYYY-MM-DD / 24h HH:MM using today's date. Use "" (or null for round/person) for anything not stated — never invent. If it is about a person/contact rather than a role, fill "person" and leave "round" null.

${AI_SCHEMA}

--- PASTED CONTENT ---
${text}
--- END ---`;
}
function aiParse(s){
  if(!s) throw new Error("Empty response");
  let t=String(s).trim().replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const a=t.indexOf("{"), b=t.lastIndexOf("}");
  if(a>=0&&b>a) t=t.slice(a,b+1);
  return JSON.parse(t);
}
// prompt + optional doc {data:base64-no-prefix, mime}; opts.json=false for prose (default JSON)
async function aiCall(prompt, doc, opts){
  const eng=aiEngine(); const wantJson = !(opts&&opts.json===false); const maxTok=(opts&&opts.maxTokens)||(doc?2048:wantJson?1024:1400);
  if(eng==="proxy"){
    const res=await fetch(aiProxyUrl(),{method:"POST",headers:Object.assign({"Content-Type":"application/json"}, sync.key?{Authorization:"Bearer "+sync.key, apikey:sync.key}:{}), body:JSON.stringify({prompt,doc:doc||undefined,maxTokens:maxTok,json:wantJson})});
    if(!res.ok) throw new Error("Proxy "+res.status+" "+(await res.text()).slice(0,140));
    const j=await res.json(); return j.text||j.output||(typeof j==="string"?j:JSON.stringify(j));
  }
  if(eng==="anthropic"){
    const content = doc ? [{type:"document",source:{type:"base64",media_type:doc.mime||"application/pdf",data:doc.data}},{type:"text",text:prompt}] : prompt;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":aiCfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:aiCfg.model||"claude-haiku-4-5",max_tokens:maxTok,messages:[{role:"user",content}]})});
    if(!res.ok) throw new Error("Claude "+res.status+" "+(await res.text()).slice(0,180));
    const j=await res.json(); return (j.content||[]).map(b=>b.text||"").join("");
  }
  if(eng==="openai"){
    const model=aiCfg.model||"gpt-4o-mini";
    const body={model,messages:[{role:"user",content:prompt}],max_tokens:maxTok};
    if(wantJson) body.response_format={type:"json_object"};
    const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+aiCfg.key},body:JSON.stringify(body)});
    if(!res.ok){ const tx=(await res.text()).slice(0,180);
      if(res.status===429) throw new Error("OpenAI rate/quota hit — check your plan & billing at platform.openai.com.");
      if(res.status===401) throw new Error("That OpenAI key looks invalid — re-copy it from platform.openai.com/api-keys.");
      throw new Error("OpenAI "+res.status+" "+tx); }
    const j=await res.json(); return (((j.choices||[])[0]||{}).message||{}).content||"";
  }
  if(eng==="google"){
    const parts = doc ? [{inline_data:{mime_type:doc.mime||"application/pdf",data:doc.data}},{text:prompt}] : [{text:prompt}];
    const genCfg = wantJson ? {responseMimeType:"application/json",maxOutputTokens:maxTok} : {maxOutputTokens:maxTok};
    const body=JSON.stringify({contents:[{parts}],generationConfig:genCfg});
    // try the chosen/default model, then fall back to others. Each free-tier model has its OWN
    // quota, so on a 429 (or a model rename = 404/400) we try the next one before giving up.
    const models=[aiCfg.model||"gemini-2.0-flash","gemini-1.5-flash","gemini-2.0-flash-lite"].filter((m,i,a)=>m&&a.indexOf(m)===i);
    let res,lastStatus=0,lastErr="";
    for(const model of models){
      res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(aiCfg.key)}`,{method:"POST",headers:{"Content-Type":"application/json"},body});
      if(res.ok) break;
      lastStatus=res.status; lastErr=(await res.text()).slice(0,160);
      if(![404,400,429].includes(res.status)) break; // model-not-found or quota → try the next model
    }
    if(!res||!res.ok){
      if(lastStatus===429) throw new Error("Gemini's free limit was hit. Free keys reset per-minute (and daily) — wait a bit and retry. For uninterrupted use, enable billing on your key (Flash stays ~free at low volume) or paste a different key in Settings.");
      if(lastStatus===400 && /API key/i.test(lastErr)) throw new Error("That Gemini key looks invalid — re-copy it from aistudio.google.com/apikey.");
      throw new Error("Gemini "+lastStatus+" "+lastErr);
    }
    const j=await res.json(); return ((((j.candidates||[])[0]||{}).content||{}).parts||[{}])[0].text||"";
  }
  throw new Error("paste-mode");
}

async function fetchJobUrl(){
  const inp=$("#spUrl"); let url=inp?inp.value.trim():"";
  if(!url){ toast("Paste a job URL first"); return; }
  if(!/^https?:\/\//i.test(url)) url="https://"+url;
  spSourceUrl=url;
  const btn=editorEl&&editorEl.querySelector('[data-act="ai-fetch-url"]'); if(btn){ btn.textContent="Fetching…"; btn.disabled=true; }
  try{
    // Jina Reader: free, CORS-friendly, returns clean readable text (no key, no backend)
    const res=await fetch("https://r.jina.ai/"+url,{headers:{Accept:"text/plain"}});
    if(!res.ok) throw new Error("status "+res.status);
    let text=await res.text();
    if(!text || text.trim().length<40) throw new Error("empty");
    if(text.length>14000) text=text.slice(0,14000);
    const ta=$("#spInput"); if(ta) ta.value=text; spText=text;
    if(btn){ btn.innerHTML=`${I.ai} Fetch`; btn.disabled=false; }
    runExtract();

/* ============================ COMPANY ENRICH (logo + pre-call brief) ============================ */
// When you're juggling 3-5 live processes, instant visual ID matters. We pull a real company
// logo + canonical domain (Clearbit autocomplete — free, no key) and an AI pre-call brief
// (tagline + ~120-word snapshot). Results cache on the opportunity (o.logo/o.domain/o.tagline/
// o.research) so they sync and never re-fetch. Logo works with zero config; brief uses aiEngine().
async function resolveCompany(name){
  if(!name) return null;
  try{
    const r=await fetch("https://autocomplete.clearbit.com/v1/companies/suggest?query="+encodeURIComponent(name));
    if(!r.ok) return null;
    const arr=await r.json();
    if(Array.isArray(arr)&&arr.length){ const m=arr[0]; return {domain:m.domain||"", logo:m.logo||(m.domain?"https://logo.clearbit.com/"+m.domain:"")}; }
  }catch(e){}
  return null;
}
async function enrichLogo(o){
  if(!o||!o.company) return false;
  if(o.domain && o.logo) return false;        // already resolved
  const m=await resolveCompany(o.company);
  if(m && m.domain){ o.domain=o.domain||m.domain; o.logo=o.logo||m.logo; o.updatedAt=Date.now(); return true; }
  return false;
}
// fire-and-forget after creating/editing a role: grab the logo, then quietly persist + refresh
function enrichLater(o){
  if(!o||!o.company||(o.domain&&o.logo)) return;
  enrichLogo(o).then(ok=>{ if(ok){ save(); render(); if(openId===o.id && $("#drawer").classList.contains("show")) renderDrawer(); } }).catch(()=>{});
}
function briefPrompt(o){
  return `Give a concise pre-interview brief for the company "${o.company}"${o.domain?` (${o.domain})`:""}${o.role?`, for a ${o.role} role`:""}.
Return ONLY a JSON object (no markdown): { "tagline": "", "brief": "" }
- "tagline": one short sentence, max ~9 words, capturing what the company does — for at-a-glance identification.
- "brief": 90-140 words, plain text, covering what they do / product, rough size & stage, who they serve, anything notable recently, and 2-3 talking points or smart questions for the call. If unsure of a fact, hedge rather than invent.`;
}
async function runResearch(o){

/* ============================ NATIVE (Capacitor iOS) ============================ */
// Everything here is guarded by isNative() so the web/PWA build is unaffected. Plugins are
// reached through the Capacitor bridge global (window.Capacitor.Plugins.*) — no bundler needed.
// Setup + the iOS Share Extension live in NATIVE.md. Calls are defensive: a missing/renamed
// plugin surfaces a toast, never a crash.
const APP_GROUP="group.com.scheidelholdings.callback";
function cap(){ return (typeof window!=="undefined") && window.Capacitor; }
function isNative(){ const c=cap(); return !!(c && c.isNativePlatform && c.isNativePlatform()); }
function plugin(){ const c=cap(); if(!c||!c.Plugins) return null; for(const n of arguments){ if(c.Plugins[n]) return c.Plugins[n]; } return null; }

function initNative(){
  if(!isNative()) return;
  try{ initShareIntake(); }catch(e){}
  scheduleRemindersSoon();
}

/* ---- Share-into-app: a recruiter email / LinkedIn profile shared into Callback ---- */
function handleSharedText(text){ if(!text||!String(text).trim()) return; spText=String(text); openSmartPaste(); }
async function initShareIntake(){
  const App=plugin("App");
  if(App && App.addListener){
    App.addListener("appUrlOpen", (d)=>{ try{ const u=new URL(d.url); const t=u.searchParams.get("text")||u.searchParams.get("url")||""; if(t) handleSharedText(decodeURIComponent(t)); }catch(e){} });
    App.addListener("resume", ()=>{ checkSharedInbox(); });
  }
  const Prefs=plugin("Preferences");
  if(Prefs && Prefs.configure){ try{ await Prefs.configure({group:APP_GROUP}); }catch(e){} }
  checkSharedInbox();
}
async function checkSharedInbox(){
  const Prefs=plugin("Preferences"); if(!Prefs) return;
  try{ const {value}=await Prefs.get({key:"shared_intake"}); if(value){ await Prefs.remove({key:"shared_intake"}); handleSharedText(value); } }catch(e){}
}

/* ---- Local-notification reminders for rounds / next steps / offer deadlines ---- */
function remAt(d,t,offMin){ const [y,m,dd]=String(d).split("-").map(Number); let [hh,mm]=String(t||"09:00").split(":").map(Number); const dt=new Date(y,(m||1)-1,dd||1,hh||9,mm||0); return dt.getTime()+(offMin||0)*60000; }
let remTimer=null;
function scheduleRemindersSoon(){ if(!isNative()||!aiCfg.reminders) return; clearTimeout(remTimer); remTimer=setTimeout(syncReminders,1500); }
async function syncReminders(){
  if(!isNative()||!aiCfg.reminders) return;
  const LN=plugin("LocalNotifications"); if(!LN) return;
  try{
    const perm = LN.checkPermissions? await LN.checkPermissions() : {display:"granted"};
    if(perm.display!=="granted") return;
    try{ const pend=await LN.getPending(); if(pend&&pend.notifications&&pend.notifications.length) await LN.cancel({notifications:pend.notifications.map(n=>({id:n.id}))}); }catch(e){}
    const notes=[]; let id=1; const now=Date.now();
    state.opportunities.forEach(o=>{
      (o.rounds||[]).forEach(r=>{ if(r.date && r.status!=="done" && r.status!=="cancelled"){ const at=remAt(r.date,r.time,r.time?-60:0); if(at>now) notes.push({id:id++,title:`${o.company} — ${r.name||r.type||"interview"}`,body:r.time?`Starts at ${r.time}`:"Today",schedule:{at:new Date(at)}}); } });
      if(o.nextActionDate){ const at=remAt(o.nextActionDate,"09:00",0); if(at>now) notes.push({id:id++,title:`${o.company}: ${o.nextActionLabel||"Next step"}`,body:"Due today",schedule:{at:new Date(at)}}); }
      if(o.offer&&o.offer.deadline){ const at=remAt(o.offer.deadline,"09:00",0); if(at>now) notes.push({id:id++,title:`${o.company}: offer decision`,body:"Decision deadline today",schedule:{at:new Date(at)}}); }
    });
    if(notes.length) await LN.schedule({notifications:notes.slice(0,60)});
  }catch(e){}
}
async function enableReminders(){
  if(!isNative()){ toast("Reminders are available in the iOS app"); return; }
  const LN=plugin("LocalNotifications"); if(!LN){ toast("Install @capacitor/local-notifications"); return; }
  try{ const p=await LN.requestPermissions(); if(p.display!=="granted"){ toast("Notifications not allowed"); return; }
    aiCfg.reminders=true; saveAICfg(); await syncReminders(); toast("Reminders on ✓"); }catch(e){ toast("⚠ "+e.message); }
}

/* ---- On-device calendar scan → Smart add ---- */
function looksLikeInterview(e){ const s=((e.title||"")+" "+(e.notes||"")).toLowerCase(); return /interview|screen(ing)?|onsite|on-site|recruiter|phone screen|hiring|hr call|technical|panel|final round/.test(s); }
async function scanCalendar(){
  if(!isNative()){ toast("Calendar scan is available in the iOS app"); return; }
  const Cal=plugin("CapacitorCalendar","Calendar"); if(!Cal){ toast("Install @ebarooni/capacitor-calendar"); return; }
  try{
    try{ if(Cal.requestFullCalendarAccess) await Cal.requestFullCalendarAccess(); else if(Cal.requestPermissions) await Cal.requestPermissions(); }catch(e){}
    const from=Date.now(), to=from+1000*60*60*24*30; let res;
    if(Cal.listEventsInRange) res=await Cal.listEventsInRange({from,to});
    else if(Cal.getEvents) res=await Cal.getEvents({startDate:from,endDate:to});
    else throw new Error("calendar API not recognized");
    const list=(res.result||res.events||res.data||[]).map(e=>({title:e.title||e.summary||"",notes:e.notes||e.description||"",location:e.location||"",start:e.startDate||e.start||e.eventStartDate}));
    const hits=list.filter(looksLikeInterview);
    if(!hits.length){ toast("No interview-like events in the next 30 days"); return; }
    spText=hits.map(e=>`${e.title}\n${e.notes}\n${e.location}\n${e.start?new Date(e.start).toString():""}`).join("\n--- next event ---\n");
    openSmartPaste();
  }catch(e){ toast("⚠ Calendar: "+e.message); }
}

/* ---- Pull a contact's details + photo into the open person form ---- */
async function pullContactInto(){
  if(!isNative()){ toast("Contacts is available in the iOS app"); return; }
  const C=plugin("Contacts","CapacitorContacts"); if(!C){ toast("Install @capacitor-community/contacts"); return; }
  const nameInp=document.querySelector('#personForm [name="name"]'); const q=(nameInp?nameInp.value:"").trim();
  if(!q){ toast("Type a name first"); return; }
  try{
    if(C.requestPermissions) await C.requestPermissions();
    const res=await C.getContacts({projection:{name:true,emails:true,urls:true,image:true,organization:true}});
    const list=res.contacts||res.result||[];
    const disp=c=>(c.name&&(c.name.display||c.displayName))||c.displayName||"";
    const hit=list.find(c=>disp(c).toLowerCase().includes(q.toLowerCase()));
    if(!hit){ toast("No matching contact"); return; }
    const set=(n,v)=>{ const el=document.querySelector(`#personForm [name="${n}"]`); if(el&&v&&!el.value) el.value=v; };
    set("name",disp(hit));
    set("email",(hit.emails&&hit.emails[0]&&(hit.emails[0].address||hit.emails[0].value))||"");
    set("title",(hit.organization&&(hit.organization.company||hit.organization.jobTitle))||"");

function fd(form){ const d={}; new FormData(form).forEach((v,k)=>d[k]=typeof v==="string"?v.trim():v); return d; }
function saveOpForm(form){
  const d=fd(form);
  if(!d.company){ toast("Company name is required"); return; }
  d.tags=d.tags?d.tags.split(",").map(s=>s.trim()).filter(Boolean):[];
  d.excitement=+d.excitement||0;
  if(d.jdFile){ try{ d.jdFile=JSON.parse(d.jdFile); }catch(e){ delete d.jdFile; } } else { d.jdFile=null; }
  const existing=getOp();
  if(existing && editorEl && !editorEl.dataset.editId){ // editing the open op
    Object.assign(existing,d,{updatedAt:Date.now()});
  } else {
    const o={id:uid(),createdAt:Date.now(),updatedAt:Date.now(),rounds:[],people:[],offer:{},...d};
    state.opportunities.push(o); openId=o.id;
  }
  save(); closeEditor(); render();
  if(getOp()){ if(!$("#drawer").classList.contains("show")) openDetail(openId); else renderDrawer(); }
  enrichLater(getOp());
  toast("Saved");
}
function saveRoundForm(form){
  const d=fd(form); const o=getOp(); o.rounds=o.rounds||[];
  d.rating=+d.rating||0;
  const editId=editorEl&&editorEl.dataset.editId;
  if(editId){ Object.assign(o.rounds.find(r=>r.id===editId),d); }
  else { o.rounds.push({id:uid(),...d}); }
  o.updatedAt=Date.now(); save(); closeEditor(); renderDrawer(); render(); toast("Round saved");
}
function savePersonForm(form){
  const d=fd(form); if(!d.name){ toast("Name required"); return; }
  const o=getOp(); o.people=o.people||[];
  const editId=editorEl&&editorEl.dataset.editId;
  if(editId){ Object.assign(o.people.find(p=>p.id===editId),d); }
  else { o.people.push({id:uid(),...d}); }
  o.updatedAt=Date.now(); save(); closeEditor(); renderDrawer(); toast("Saved");
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  const d=new Date(); a.download=`callback-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
  a.click(); toast("Backup downloaded");
}
function importFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
    if(!data.opportunities) throw 0;
    if(state.opportunities.length && !confirm("Replace your current data with this backup? (Export first if unsure.)")) return;
    state=data; save(); render(); toast("Imported "+data.opportunities.length+" roles");
  }catch(e){ toast("⚠ That file didn't look like a Callback backup"); } };
  r.readAsText(file);
}

/* ============================ COPY / TOAST ============================ */
function copy(text,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>toast(msg||"Copied"),()=>fallbackCopy(text,msg)); }
  else fallbackCopy(text,msg);
}
function fallbackCopy(text,msg){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy"); toast(msg||"Copied");}catch(e){toast("Press ⌘/Ctrl+C to copy");} ta.remove(); }
let toastT;
function toast(msg){ const t=$("#toast"); t.innerHTML=`${I.check}<span>${esc(msg)}</span>`; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2400); }

function fileToData(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res({name:file.name,type:file.type||"application/octet-stream",size:file.size,data:r.result}); r.onerror=rej; r.readAsDataURL(file); }); }
function downloadData(f){ if(!f||!f.data) return; const a=document.createElement("a"); a.href=f.data; a.download=f.name||"file"; document.body.appendChild(a); a.click(); a.remove(); }
function fileSizeStr(n){ if(!n) return ""; return n<1024?n+" B":n<1048576?(n/1024).toFixed(0)+" KB":(n/1048576).toFixed(1)+" MB"; }
// generic file picker that stashes the chosen file's data into a hidden form input (name=field) + shows the filename
async function pickFileInto(field, accept){
  const inp=document.createElement("input"); inp.type="file"; if(accept) inp.accept=accept;
  inp.onchange=async()=>{ const file=inp.files[0]; if(!file) return;
    if(file.size>4*1024*1024){ toast("⚠ File too big (max ~4MB)"); return; }
    const f=await fileToData(file);
    const hidden=document.querySelector(`[name="${field}"]`); if(hidden) hidden.value=JSON.stringify(f);
    const lbl=document.querySelector(`[data-filename="${field}"]`); if(lbl) lbl.innerHTML=`📎 ${esc(f.name)} <span style="color:var(--faint)">${fileSizeStr(f.size)}</span> · <span data-clearfile="${field}" style="color:var(--bad);cursor:pointer">remove</span>`;
  };
  inp.click();
}

function resumeText(){
  const d=state.resume&&state.resume.data;
  let s = (d && (d.name||d.summary||(d.experience&&d.experience.length))) ? resumeDerivedText(d)
        : (state.resume && state.resume.text && state.resume.text.trim()) ? state.resume.text.trim()
        : "[PASTE YOUR RESUME / SUMMARY HERE]";
  return s.length>4000 ? s.slice(0,4000)+"\n…(trimmed)" : s;  // keep prompts lean for free-tier limits/cost
}
function resumeDerivedText(d){
  const L=[]; if(d.name) L.push(d.name); if(d.title) L.push(d.title);
  const c=d.contact||{}; const cl=[c.email,c.phone,c.location,c.linkedin,c.website].filter(Boolean).join(" · "); if(cl) L.push(cl);
  if(d.summary){ L.push("","SUMMARY",d.summary); }
  if((d.experience||[]).length){ L.push("","EXPERIENCE"); d.experience.forEach(x=>{ const head=[x.role,x.company].filter(Boolean).join(" — "); const dt=[x.start,x.end].filter(Boolean).join("–"); L.push(head+(dt?"  ("+dt+")":"")+(x.location?"  · "+x.location:"")); (x.bullets||[]).forEach(b=>L.push("• "+b)); }); }
  if((d.education||[]).length){ L.push("","EDUCATION"); d.education.forEach(x=>{ const dt=[x.start,x.end].filter(Boolean).join("–"); L.push([x.degree,x.school].filter(Boolean).join(", ")+(dt?"  ("+dt+")":"")+(x.detail?" — "+x.detail:"")); }); }
  if((d.skills||[]).length){ L.push("","SKILLS",d.skills.join(", ")); }
  return L.join("\n");
}
function normalizeResume(d){
  d=d||{}; d.contact=d.contact||{};
  d.experience=Array.isArray(d.experience)?d.experience.map(x=>({role:x.role||"",company:x.company||"",location:x.location||"",start:x.start||"",end:x.end||"",bullets:Array.isArray(x.bullets)?x.bullets.filter(Boolean):(x.bullets?[String(x.bullets)]:[])})):[];
  d.education=Array.isArray(d.education)?d.education.map(x=>({school:x.school||"",degree:x.degree||"",detail:x.detail||"",start:x.start||"",end:x.end||""})):[];
  d.skills=Array.isArray(d.skills)?d.skills.filter(Boolean):(typeof d.skills==="string"?d.skills.split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[]);
  d.name=d.name||""; d.title=d.title||""; d.summary=d.summary||""; d.template=d.template||"modern";
  return d;
}

/* ============================ CALENDAR (.ics / Google) ============================ */
function pad2(n){ return String(n).padStart(2,"0"); }
function icsStamp(date,time,addMin){
  // date "YYYY-MM-DD", time "HH:MM" -> local time components (floating, no TZ) so it lands at the shown wall-clock time
  const [y,m,d]=date.split("-").map(Number); let [hh,mm]=(time||"09:00").split(":").map(Number);
  let dt=new Date(y,(m-1),d,hh||9,mm||0); if(addMin) dt=new Date(dt.getTime()+addMin*60000);
  return `${dt.getFullYear()}${pad2(dt.getMonth()+1)}${pad2(dt.getDate())}T${pad2(dt.getHours())}${pad2(dt.getMinutes())}00`;
}
function eventTitle(o,r){ return `${r.name||r.type||"Interview"} — ${o.company}`; }
function eventDesc(o,r){ return [r.type?("Type: "+r.type):"", r.interviewers?("With: "+r.interviewers):"", r.link?("Link: "+r.link):"", o.role?("Role: "+o.role):"", r.prep?("Prep: "+r.prep):""].filter(Boolean).join("\\n"); }
function downloadICS(o,r){
  if(!r.date){ toast("Add a date to this round first"); return; }
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Callback//Interview//EN","BEGIN:VEVENT",
    "UID:"+(r.id||uid())+"@callback","SUMMARY:"+eventTitle(o,r).replace(/[\n,;]/g," "),
    "DTSTART:"+icsStamp(r.date,r.time), "DTEND:"+icsStamp(r.date,r.time,60),
    "DESCRIPTION:"+eventDesc(o,r), r.link?("URL:"+r.link):"", "LOCATION:"+(r.link||"").replace(/[\n,;]/g," "),
    "BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:"+eventTitle(o,r),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"].filter(Boolean).join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=(o.company+"-"+(r.name||r.type||"interview")).replace(/[^\w-]+/g,"_")+".ics";
  document.body.appendChild(a); a.click(); a.remove(); toast("Calendar file downloaded — open it to add");
}
function findRound(rid){ for(const o of state.opportunities){ const r=(o.rounds||[]).find(x=>x.id===rid); if(r) return {o,r}; } return null; }
function googleCalUrl(o,r){
  const p=new URLSearchParams({action:"TEMPLATE", text:eventTitle(o,r),
    dates:icsStamp(r.date,r.time)+"/"+icsStamp(r.date,r.time,60),
    details:eventDesc(o,r).replace(/\\n/g,"\n"), location:r.link||""});
  return "https://calendar.google.com/calendar/render?"+p.toString();
}

// register a tiny inline manifest so Android shows "Install"
try{
  const mani={name:"CallBack — Interview Tracker",short_name:"CallBack",display:"standalone",background_color:"#0a0b0e",theme_color:"#0a0b0e",start_url:".",icons:[{src:"icon-192.png",sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:"icon-512.png",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(new Blob([JSON.stringify(mani)],{type:"application/manifest+json"})); document.head.appendChild(link);
}catch(e){}
// register the service worker for true offline (web/PWA); harmless when opened via file://
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

render();
initSync();
initNative();
// dismiss the branded launch splash (only visible when installed/standalone)
(function(){ const s=document.getElementById("splash"); if(!s) return;
  setTimeout(()=>{ s.classList.add("hide"); setTimeout(()=>s.remove(),500); }, 700); })();
let wasMobile=isMobile();
window.addEventListener("resize",()=>{ const m=isMobile(); if(m!==wasMobile){ wasMobile=m; render(); } });
</script>
